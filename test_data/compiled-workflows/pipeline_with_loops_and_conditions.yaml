          jsonPath: $.pod-spec-patch
      - default: "false"
        name: cached-decision
        valueFrom:
          default: "false"
          jsonPath: $.cached-decision
      - name: condition
        valueFrom:
          default: "true"
          jsonPath: $.condition
    plugin:
      driver-plugin:
        args:
          cache_disabled: false
          cached_decision_path: '{{outputs.parameters.cached-decision.path}}'
          component: '{{inputs.parameters.component}}'
          condition_path: '{{outputs.parameters.condition.path}}'
          container: '{{inputs.parameters.container}}'
          dag_execution_id: '{{inputs.parameters.parent-dag-id}}'
          http_proxy: ""
          https_proxy: ""
          iteration_index: '{{inputs.parameters.iteration-index}}'
          kubernetes_config: '{{inputs.parameters.kubernetes-config}}'
          metadata_tls_enabled: false
          ml_pipeline_server_address: ml-pipeline.kubeflow.svc.cluster.local
          ml_pipeline_server_port: "8887"
          ml_pipeline_tls_enabled: false
          mlmd_server_address: metadata-grpc-service.kubeflow.svc.cluster.local
          mlmd_server_port: "8080"
          no_proxy: ""
          pipeline_name: pipeline-with-loops-and-conditions-multi-layers
          pod_spec_patch_path: '{{outputs.parameters.pod-spec-patch.path}}'
          run_display_name: ""
          run_id: '{{workflow.uid}}'
          run_name: '{{workflow.name}}'
          task: '{{inputs.parameters.task}}'
          task_name: '{{inputs.parameters.task-name}}'
          type: CONTAINER
    securityContext:
      runAsNonRoot: true
      seccompProfile:
        type: RuntimeDefault
  - dag:
      tasks:
      - arguments:
          parameters:
          - name: pod-spec-patch
            value: '{{inputs.parameters.pod-spec-patch}}'
        name: executor
        template: system-container-impl
        when: '{{inputs.parameters.cached-decision}} != true'
    inputs:
      parameters:
      - name: pod-spec-patch
      - default: "false"
        name: cached-decision
    metadata: {}
    name: system-container-executor
    outputs: {}
  - container:
      command:
      - should-be-overridden-during-runtime
      env:
      - name: KFP_POD_NAME
        valueFrom:
          fieldRef:
            fieldPath: metadata.name
      - name: KFP_POD_UID
        valueFrom:
          fieldRef:
            fieldPath: metadata.uid
      envFrom:
      - configMapRef:
          name: metadata-grpc-configmap
          optional: true
      image: gcr.io/ml-pipeline/should-be-overridden-during-runtime
      name: ""
      resources: {}
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
          - ALL
        seccompProfile:
          type: RuntimeDefault
      volumeMounts:
