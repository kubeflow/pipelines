        ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip || python3
        -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1
        python3 -m pip install --quiet --no-warn-script-location ''requests''  \u0026\u0026  python3
        -m pip install --quiet --no-warn-script-location ''kfp==2.14.4'' ''--no-deps''
        ''typing-extensions\u003e=3.7.4,\u003c5; python_version\u003c\"3.9\"'' \u0026\u0026
        \"$0\" \"$@\"\n","sh","-ec","program_path=$(mktemp -d)\n\nprintf \"%s\" \"$0\"
        \u003e \"$program_path/ephemeral_component.py\"\n_KFP_RUNTIME=true python3
        -m kfp.dsl.executor_main                         --component_module_path                         \"$program_path/ephemeral_component.py\"                         \"$@\"\n","\nimport
        kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import *\n\ndef
        submit_request(url: str):\n    import requests\n    import os\n\n    # If
        running pipeline in multi-user mode, skip submitting request to external address.\n    multi_user
        = os.getenv(''MULTI_USER'', ''false'')\n    if multi_user.lower() != ''true'':\n        return\n\n    scheme
        = os.getenv(''SCHEME'', ''http'')\n    if scheme not in [''http'', ''https'']:\n        raise
        Exception(f\"Invalid scheme: {scheme}\")\n\n    url = f''{scheme}://{url}''\n    #
        Submit HTTP or HTTPS request to in-cluster endpoint and external address,
        depending on the scheme specified by env var.\n    try:\n        response
        = requests.get(url, verify=True, timeout=5)\n        print(response.status_code)\n    except
        Exception as e:\n        raise Exception(f\"Failed to request {url}: {e}\")\n    if
        response.status_code != 200:\n        raise Exception(f\"Failed to request
        {url}: {response.status_code}\")\n\n"],"image":"python:3.11"}'
