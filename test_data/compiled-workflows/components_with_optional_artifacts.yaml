apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  annotations:
    workflows.argoproj.io/pod-name-format: v1
  generateName: optional-artifact-pipeline-
spec:
  arguments:
    parameters:
    - name: implementations-comp-importer
      value: '{"artifactUri":{"constant":"gs://ml-pipeline-playground/shakespeare1.txt"},"typeSchema":{"schemaTitle":"system.Dataset","schemaVersion":"0.0.1"}}'
  entrypoint: entrypoint
  podMetadata:
    annotations:
      pipelines.kubeflow.org/v2_component: "true"
    labels:
      pipelines.kubeflow.org/v2_component: "true"
  securityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  serviceAccountName: pipeline-runner
  templates:
  - container:
      args:
      - --type
      - CONTAINER
      - --pipeline_name
      - optional-artifact-pipeline
      - --run_id
      - '{{workflow.uid}}'
      - --run_name
      - '{{workflow.name}}'
      - --run_display_name
      - ""
      - --parent_task_id
      - '{{inputs.parameters.parent-dag-task-id}}'
      - --task_name
      - '{{inputs.parameters.task-name}}'
      - --iteration_index
      - '{{inputs.parameters.iteration-index}}'
      - --cached_decision_path
      - '{{outputs.parameters.cached-decision.path}}'
      - --pod_spec_patch_path
      - '{{outputs.parameters.pod-spec-patch.path}}'
      - --condition_path
      - '{{outputs.parameters.condition.path}}'
      - --kubernetes_config
      - '{{inputs.parameters.kubernetes-config}}'
      - --http_proxy
      - ""
      - --https_proxy
      - ""
      - --no_proxy
      - ""
      - --ml_pipeline_server_address
      - ml-pipeline.kubeflow.svc.cluster.local
      - --ml_pipeline_server_port
      - "8887"
      command:
      - driver
      env:
      - name: KFP_POD_NAME
        valueFrom:
          fieldRef:
            fieldPath: metadata.name
      - name: KFP_POD_UID
        valueFrom:
          fieldRef:
            fieldPath: metadata.uid
      - name: NAMESPACE
        valueFrom:
          fieldRef:
            fieldPath: metadata.namespace
      image: ghcr.io/kubeflow/kfp-driver:latest
      name: ""
      resources:
        limits:
          cpu: 500m
          memory: 512Mi
        requests:
          cpu: 100m
          memory: 64Mi
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
          - ALL
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      volumeMounts:
      - mountPath: /var/run/secrets/kfp
        name: kfp-launcher-token
        readOnly: true
    inputs:
      parameters:
      - name: task-name
      - name: parent-dag-task-id
      - default: "-1"
        name: iteration-index
      - default: ""
        name: kubernetes-config
    metadata:
      annotations:
        pipelines.kubeflow.org/template-name: system-container-driver
      labels:
        pipelines.kubeflow.org/pod-role: container-driver
    name: system-container-driver
    outputs:
      parameters:
      - name: pod-spec-patch
        valueFrom:
          default: ""
          path: /tmp/outputs/pod-spec-patch
      - default: "false"
        name: cached-decision
        valueFrom:
          default: "false"
          path: /tmp/outputs/cached-decision
      - name: condition
        valueFrom:
          default: "true"
          path: /tmp/outputs/condition
    securityContext:
      runAsNonRoot: true
      seccompProfile:
        type: RuntimeDefault
    volumes:
    - name: kfp-launcher-token
      projected:
        sources:
        - serviceAccountToken:
            audience: pipelines.kubeflow.org
            expirationSeconds: 7200
            path: token
  - dag:
      tasks:
      - arguments:
          parameters:
          - name: pod-spec-patch
            value: '{{inputs.parameters.pod-spec-patch}}'
        name: executor
        template: system-container-impl
        when: '{{inputs.parameters.cached-decision}} != true'
    inputs:
      parameters:
      - name: pod-spec-patch
      - default: "false"
        name: cached-decision
      - default: "-1"
        name: iteration-index
    metadata: {}
    name: system-container-executor
    outputs: {}
  - container:
      command:
      - should-be-overridden-during-runtime
      env:
      - name: KFP_POD_NAME
        valueFrom:
          fieldRef:
            fieldPath: metadata.name
      - name: KFP_POD_UID
        valueFrom:
          fieldRef:
            fieldPath: metadata.uid
      - name: NAMESPACE
        valueFrom:
          fieldRef:
            fieldPath: metadata.namespace
      envFrom:
      - configMapRef:
          name: metadata-grpc-configmap
          optional: true
      image: gcr.io/ml-pipeline/should-be-overridden-during-runtime
      name: ""
      resources: {}
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
          - ALL
        seccompProfile:
          type: RuntimeDefault
      volumeMounts:
      - mountPath: /kfp-launcher
        name: kfp-launcher
      - mountPath: /var/run/secrets/kfp
        name: kfp-launcher-token
        readOnly: true
      - mountPath: /gcs
        name: gcs-scratch
      - mountPath: /s3
        name: s3-scratch
      - mountPath: /minio
        name: minio-scratch
      - mountPath: /.local
        name: dot-local-scratch
      - mountPath: /.cache
        name: dot-cache-scratch
      - mountPath: /.config
        name: dot-config-scratch
    initContainers:
    - args:
      - --copy
      - /kfp-launcher/launch
      command:
      - launcher-v2
      image: ghcr.io/kubeflow/kfp-launcher:latest
      name: kfp-launcher
      resources:
        limits:
          cpu: 500m
          memory: 256Mi
        requests:
          cpu: 100m
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
          - ALL
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      volumeMounts:
      - mountPath: /kfp-launcher
        name: kfp-launcher
    inputs:
      parameters:
      - name: pod-spec-patch
    metadata:
      annotations:
        pipelines.kubeflow.org/template-name: system-container-impl
      labels:
        pipelines.kubeflow.org/pod-role: container-executor
    name: system-container-impl
    outputs: {}
    podSpecPatch: '{{inputs.parameters.pod-spec-patch}}'
    securityContext:
      seccompProfile:
        type: RuntimeDefault
    volumes:
    - emptyDir: {}
      name: kfp-launcher
    - name: kfp-launcher-token
      projected:
        sources:
        - serviceAccountToken:
            audience: pipelines.kubeflow.org
            expirationSeconds: 7200
            path: token
    - emptyDir: {}
      name: gcs-scratch
    - emptyDir: {}
      name: s3-scratch
    - emptyDir: {}
      name: minio-scratch
    - emptyDir: {}
      name: dot-local-scratch
    - emptyDir: {}
      name: dot-cache-scratch
    - emptyDir: {}
      name: dot-config-scratch
  - dag:
      tasks:
      - arguments:
          parameters:
          - name: task-name
            value: python-artifact-printer
          - name: parent-dag-task-id
            value: '{{inputs.parameters.parent-dag-task-id}}'
        name: python-artifact-printer-driver
        template: system-container-driver
      - arguments:
          parameters:
          - name: pod-spec-patch
            value: '{{tasks.python-artifact-printer-driver.outputs.parameters.pod-spec-patch}}'
          - default: "false"
            name: cached-decision
            value: '{{tasks.python-artifact-printer-driver.outputs.parameters.cached-decision}}'
        depends: python-artifact-printer-driver.Succeeded
        name: python-artifact-printer
        template: system-container-executor
    inputs:
      parameters:
      - name: parent-dag-task-id
    metadata: {}
    name: comp-inner-pipeline
    outputs: {}
  - dag:
      tasks:
      - arguments:
          parameters:
          - name: task-name
            value: python-artifact-printer
          - name: parent-dag-task-id
            value: '{{inputs.parameters.parent-dag-task-id}}'
        name: python-artifact-printer-driver
        template: system-container-driver
      - arguments:
          parameters:
          - name: pod-spec-patch
            value: '{{tasks.python-artifact-printer-driver.outputs.parameters.pod-spec-patch}}'
          - default: "false"
            name: cached-decision
            value: '{{tasks.python-artifact-printer-driver.outputs.parameters.cached-decision}}'
        depends: python-artifact-printer-driver.Succeeded
        name: python-artifact-printer
        template: system-container-executor
    inputs:
      parameters:
      - name: parent-dag-task-id
    metadata: {}
    name: comp-inner-pipeline-2
    outputs: {}
  - container:
      args:
      - --executor_type
      - importer
      - --task_name
      - '{{inputs.parameters.task-name}}'
      - --importer_spec
      - '{{inputs.parameters.importer}}'
      - --pipeline_name
      - optional-artifact-pipeline
      - --run_id
      - '{{workflow.uid}}'
      - --parent_task_id
      - '{{inputs.parameters.parent-dag-task-id}}'
      - --iteration_index
      - '{{inputs.parameters.iteration-index}}'
      - --pod_name
      - $(KFP_POD_NAME)
      - --pod_uid
      - $(KFP_POD_UID)
      command:
      - launcher-v2
      env:
      - name: KFP_POD_NAME
        valueFrom:
          fieldRef:
            fieldPath: metadata.name
      - name: KFP_POD_UID
        valueFrom:
          fieldRef:
            fieldPath: metadata.uid
      - name: NAMESPACE
        valueFrom:
          fieldRef:
            fieldPath: metadata.namespace
      envFrom:
      - configMapRef:
          name: metadata-grpc-configmap
          optional: true
      image: ghcr.io/kubeflow/kfp-launcher:latest
      name: ""
      resources:
        limits:
          cpu: 500m
          memory: 512Mi
        requests:
          cpu: 100m
          memory: 64Mi
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
          - ALL
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      volumeMounts:
      - mountPath: /var/run/secrets/kfp
        name: kfp-launcher-token
        readOnly: true
    inputs:
      parameters:
      - name: task-name
      - name: importer
      - name: parent-dag-task-id
      - default: "-1"
        name: iteration-index
    metadata:
      annotations:
        pipelines.kubeflow.org/template-name: system-importer
      labels:
        pipelines.kubeflow.org/pod-role: importer
    name: system-importer
    outputs: {}
    securityContext:
      runAsNonRoot: true
      seccompProfile:
        type: RuntimeDefault
    volumes:
    - name: kfp-launcher-token
      projected:
        sources:
        - serviceAccountToken:
            audience: pipelines.kubeflow.org
            expirationSeconds: 7200
            path: token
  - container:
      args:
      - --type
      - '{{inputs.parameters.driver-type}}'
      - --pipeline_name
      - optional-artifact-pipeline
      - --run_id
      - '{{workflow.uid}}'
      - --run_name
      - '{{workflow.name}}'
      - --run_display_name
      - ""
      - --parent_task_id
      - '{{inputs.parameters.parent-dag-task-id}}'
      - --task_name
      - '{{inputs.parameters.task-name}}'
      - --runtime_config
      - '{{inputs.parameters.runtime-config}}'
      - --iteration_index
      - '{{inputs.parameters.iteration-index}}'
      - --parent_task_id_path
      - '{{outputs.parameters.parent-dag-task-id-path.path}}'
      - --iteration_count_path
      - '{{outputs.parameters.iteration-count.path}}'
      - --condition_path
      - '{{outputs.parameters.condition.path}}'
      - --http_proxy
      - ""
      - --https_proxy
      - ""
      - --no_proxy
      - ""
      - --ml_pipeline_server_address
      - ml-pipeline.kubeflow.svc.cluster.local
      - --ml_pipeline_server_port
      - "8887"
      command:
      - driver
      env:
      - name: KFP_POD_NAME
        valueFrom:
          fieldRef:
            fieldPath: metadata.name
      - name: KFP_POD_UID
        valueFrom:
          fieldRef:
            fieldPath: metadata.uid
      - name: NAMESPACE
        valueFrom:
          fieldRef:
            fieldPath: metadata.namespace
      image: ghcr.io/kubeflow/kfp-driver:latest
      name: ""
      resources:
        limits:
          cpu: 500m
          memory: 512Mi
        requests:
          cpu: 100m
          memory: 64Mi
      volumeMounts:
      - mountPath: /var/run/secrets/kfp
        name: kfp-launcher-token
        readOnly: true
    inputs:
      parameters:
      - default: ""
        name: runtime-config
      - default: ""
        name: task-name
      - default: ""
        name: parent-dag-task-id
      - default: "-1"
        name: iteration-index
      - default: DAG
        name: driver-type
    metadata:
      annotations:
        pipelines.kubeflow.org/template-name: system-dag-driver
      labels:
        pipelines.kubeflow.org/pod-role: dag-driver
    name: system-dag-driver
    outputs:
      parameters:
      - name: parent-dag-task-id-path
        valueFrom:
          path: /tmp/outputs/task-id
      - name: iteration-count
        valueFrom:
          default: "0"
          path: /tmp/outputs/iteration-count
      - name: condition
        valueFrom:
          default: "true"
          path: /tmp/outputs/condition
    volumes:
    - name: kfp-launcher-token
      projected:
        sources:
        - serviceAccountToken:
            audience: pipelines.kubeflow.org
            expirationSeconds: 7200
            path: token
  - dag:
      tasks:
      - arguments:
          parameters:
          - name: task-name
            value: custom-artifact-printer
          - name: parent-dag-task-id
            value: '{{inputs.parameters.parent-dag-task-id}}'
        name: custom-artifact-printer-driver
        template: system-container-driver
      - arguments:
          parameters:
          - name: pod-spec-patch
            value: '{{tasks.custom-artifact-printer-driver.outputs.parameters.pod-spec-patch}}'
          - default: "false"
            name: cached-decision
            value: '{{tasks.custom-artifact-printer-driver.outputs.parameters.cached-decision}}'
        depends: custom-artifact-printer-driver.Succeeded
        name: custom-artifact-printer
        template: system-container-executor
      - arguments:
          parameters:
          - name: task-name
            value: custom-artifact-printer-2
          - name: parent-dag-task-id
            value: '{{inputs.parameters.parent-dag-task-id}}'
        name: custom-artifact-printer-2-driver
        template: system-container-driver
      - arguments:
          parameters:
          - name: pod-spec-patch
            value: '{{tasks.custom-artifact-printer-2-driver.outputs.parameters.pod-spec-patch}}'
          - default: "false"
            name: cached-decision
            value: '{{tasks.custom-artifact-printer-2-driver.outputs.parameters.cached-decision}}'
        depends: custom-artifact-printer-2-driver.Succeeded
        name: custom-artifact-printer-2
        template: system-container-executor
      - arguments:
          parameters:
          - name: task-name
            value: importer
          - name: importer
            value: '{{workflow.parameters.implementations-comp-importer}}'
          - name: parent-dag-task-id
            value: '{{inputs.parameters.parent-dag-task-id}}'
        name: importer
        template: system-importer
      - arguments:
          parameters:
          - name: parent-dag-task-id
            value: '{{inputs.parameters.parent-dag-task-id}}'
          - name: task-name
            value: inner-pipeline
        depends: importer.Succeeded
        name: inner-pipeline-driver
        template: system-dag-driver
      - arguments:
          parameters:
          - name: parent-dag-task-id
            value: '{{tasks.inner-pipeline-driver.outputs.parameters.parent-dag-task-id-path}}'
          - name: condition
            value: '{{tasks.inner-pipeline-driver.outputs.parameters.condition}}'
        depends: inner-pipeline-driver.Succeeded
        name: inner-pipeline
        template: comp-inner-pipeline
      - arguments:
          parameters:
          - name: parent-dag-task-id
            value: '{{inputs.parameters.parent-dag-task-id}}'
          - name: task-name
            value: inner-pipeline-2
        name: inner-pipeline-2-driver
        template: system-dag-driver
      - arguments:
          parameters:
          - name: parent-dag-task-id
            value: '{{tasks.inner-pipeline-2-driver.outputs.parameters.parent-dag-task-id-path}}'
          - name: condition
            value: '{{tasks.inner-pipeline-2-driver.outputs.parameters.condition}}'
        depends: inner-pipeline-2-driver.Succeeded
        name: inner-pipeline-2
        template: comp-inner-pipeline-2
    inputs:
      parameters:
      - name: parent-dag-task-id
    metadata: {}
    name: root
    outputs: {}
  - dag:
      tasks:
      - arguments:
          parameters:
          - name: runtime-config
            value: '{}'
          - name: driver-type
            value: ROOT_DAG
        name: root-driver
        template: system-dag-driver
      - arguments:
          parameters:
          - name: parent-dag-task-id
            value: '{{tasks.root-driver.outputs.parameters.parent-dag-task-id-path}}'
          - name: condition
            value: ""
        depends: root-driver.Succeeded
        name: root
        template: root
    inputs: {}
    metadata: {}
    name: entrypoint
    outputs: {}
status:
  finishedAt: null
  startedAt: null
