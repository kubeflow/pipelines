# Grants the default-editor service account in the user namespace permission to
# manage shared pipelines. Shared pipelines have no namespace, so authorization
# is checked against the KFP system namespace (kubeflow). This RoleBinding allows
# the test user to create, update, and delete shared pipelines.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: shared-pipeline-edit
  namespace: kubeflow
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kubeflow-edit
subjects:
- kind: ServiceAccount
  name: default-editor
  namespace: kubeflow-user-example-com
