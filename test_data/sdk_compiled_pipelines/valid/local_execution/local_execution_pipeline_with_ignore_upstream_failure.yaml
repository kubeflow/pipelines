# PIPELINE DEFINITION
# Name: pipeline-with-ignore-upstream-failure
# Inputs:
#    marker_path: str
components:
  comp-fail-always:
    executorLabel: exec-fail-always
    outputDefinitions:
      parameters:
        Output:
          parameterType: STRING
  comp-write-marker:
    executorLabel: exec-write-marker
    inputDefinitions:
      parameters:
        marker_path:
          parameterType: STRING
    outputDefinitions:
      parameters:
        Output:
          parameterType: STRING
deploymentSpec:
  executors:
    exec-fail-always:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - fail_always
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.15.2'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef fail_always() -> str:\n    raise RuntimeError('upstream failed\
          \ intentionally')\n\n"
        image: python:3.11
    exec-write-marker:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - write_marker
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.15.2'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef write_marker(marker_path: str) -> str:\n    with open(marker_path,\
          \ 'w') as f:\n        f.write('cleanup_ran')\n    return 'cleanup_ran'\n\
          \n"
        image: python:3.11
pipelineInfo:
  name: pipeline-with-ignore-upstream-failure
root:
  dag:
    tasks:
      fail-always:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-fail-always
        taskInfo:
          name: fail-always
      write-marker:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-write-marker
        dependentTasks:
        - fail-always
        inputs:
          parameters:
            marker_path:
              componentInputParameter: marker_path
        taskInfo:
          name: write-marker
        triggerPolicy:
          strategy: ALL_UPSTREAM_TASKS_COMPLETED
  inputDefinitions:
    parameters:
      marker_path:
        parameterType: STRING
schemaVersion: 2.1.0
sdkVersion: kfp-2.15.2
