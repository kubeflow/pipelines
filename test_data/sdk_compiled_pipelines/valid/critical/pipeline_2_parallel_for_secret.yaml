# PIPELINE DEFINITION
# Name: pipeline-2-parallel-for-secret
# Description: Pipeline with 1 component inside ParallelFor using use_secret_as_env.
# Inputs:
#    my_secret_name: str
components:
  comp-example-component:
    executorLabel: exec-example-component
    inputDefinitions:
      parameters:
        item:
          parameterType: STRING
    outputDefinitions:
      parameters:
        Output:
          parameterType: STRING
  comp-for-loop-2:
    dag:
      tasks:
        example-component:
          cachingOptions:
            enableCache: true
          componentRef:
            name: comp-example-component
          inputs:
            parameters:
              item:
                componentInputParameter: pipelinechannel--loop-item-param-1
          taskInfo:
            name: example-component
    inputDefinitions:
      parameters:
        pipelinechannel--loop-item-param-1:
          parameterType: STRING
        pipelinechannel--my_secret_name:
          parameterType: STRING
deploymentSpec:
  executors:
    exec-example-component:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - example_component
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.15.2'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef example_component(item: str) -> str:\n    import os\n    secret_val\
          \ = os.environ.get(\"MY_SECRET_KEY\", \"not-set\")\n    print(f\"Item: {item},\
          \ Secret value: {secret_val}\")\n    return secret_val\n\n"
        image: python:3.11
pipelineInfo:
  description: Pipeline with 1 component inside ParallelFor using use_secret_as_env.
  name: pipeline-2-parallel-for-secret
root:
  dag:
    tasks:
      for-loop-2:
        componentRef:
          name: comp-for-loop-2
        inputs:
          parameters:
            pipelinechannel--my_secret_name:
              componentInputParameter: my_secret_name
        iteratorPolicy:
          parallelismLimit: 1
        parameterIterator:
          itemInput: pipelinechannel--loop-item-param-1
          items:
            raw: '["a", "b", "c"]'
        taskInfo:
          name: for-loop-2
  inputDefinitions:
    parameters:
      my_secret_name:
        parameterType: STRING
schemaVersion: 2.1.0
sdkVersion: kfp-2.15.2
---
platforms:
  kubernetes:
    deploymentSpec:
      executors:
        exec-example-component:
          secretAsEnv:
          - keyToEnv:
            - envVar: MY_SECRET_KEY
              secretKey: MY_SECRET_KEY
            optional: false
            secretNameParameter:
              componentInputParameter: pipelinechannel--my_secret_name
