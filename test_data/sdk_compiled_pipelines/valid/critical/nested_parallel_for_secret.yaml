# PIPELINE DEFINITION
# Name: pipeline-4-nested-parallel-for-secret
# Description: Pipeline with outer task output used as secret name inside ParallelFor.
components:
  comp-emit-secret-name:
    executorLabel: exec-emit-secret-name
    outputDefinitions:
      parameters:
        Output:
          parameterType: STRING
  comp-for-loop-2:
    dag:
      tasks:
        worker-component:
          cachingOptions:
            enableCache: true
          componentRef:
            name: comp-worker-component
          inputs:
            parameters:
              item:
                componentInputParameter: pipelinechannel--loop-item-param-1
          taskInfo:
            name: worker-component
    inputDefinitions:
      parameters:
        pipelinechannel--emit-secret-name-Output:
          parameterType: STRING
        pipelinechannel--loop-item-param-1:
          parameterType: STRING
  comp-worker-component:
    executorLabel: exec-worker-component
    inputDefinitions:
      parameters:
        item:
          parameterType: STRING
    outputDefinitions:
      parameters:
        Output:
          parameterType: STRING
deploymentSpec:
  executors:
    exec-emit-secret-name:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - emit_secret_name
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.15.2'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef emit_secret_name() -> str:\n    \"\"\"Emits the secret name dynamically.\"\
          \"\"\n    return \"test-secret-1\"\n\n"
        image: python:3.11
    exec-worker-component:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - worker_component
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.15.2'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef worker_component(item: str) -> str:\n    import os\n    secret_val\
          \ = os.environ.get(\"MY_SECRET_KEY\", \"not-set\")\n    print(f\"Item: {item},\
          \ Secret value: {secret_val}\")\n    return secret_val\n\n"
        image: python:3.11
pipelineInfo:
  description: Pipeline with outer task output used as secret name inside ParallelFor.
  name: pipeline-4-nested-parallel-for-secret
root:
  dag:
    tasks:
      emit-secret-name:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-emit-secret-name
        taskInfo:
          name: emit-secret-name
      for-loop-2:
        componentRef:
          name: comp-for-loop-2
        dependentTasks:
        - emit-secret-name
        inputs:
          parameters:
            pipelinechannel--emit-secret-name-Output:
              taskOutputParameter:
                outputParameterKey: Output
                producerTask: emit-secret-name
        iteratorPolicy:
          parallelismLimit: 1
        parameterIterator:
          itemInput: pipelinechannel--loop-item-param-1
          items:
            raw: '["x", "y"]'
        taskInfo:
          name: for-loop-2
schemaVersion: 2.1.0
sdkVersion: kfp-2.15.2
---
platforms:
  kubernetes:
    deploymentSpec:
      executors:
        exec-worker-component:
          secretAsEnv:
          - keyToEnv:
            - envVar: MY_SECRET_KEY
              secretKey: username
            optional: false
            secretNameParameter:
              componentInputParameter: pipelinechannel--emit-secret-name-Output
