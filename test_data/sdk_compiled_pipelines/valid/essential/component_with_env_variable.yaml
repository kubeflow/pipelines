# PIPELINE DEFINITION
# Name: pipeline-with-env-variable
# Inputs:
#    var_name: str [Default: 'KFP_TEST_ENV_VAR']
# Outputs:
#    Output: str
components:
  comp-read-env-var:
    executorLabel: exec-read-env-var
    inputDefinitions:
      parameters:
        var_name:
          parameterType: STRING
    outputDefinitions:
      parameters:
        Output:
          parameterType: STRING
deploymentSpec:
  executors:
    exec-read-env-var:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - read_env_var
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.15.2'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef read_env_var(var_name: str) -> str:\n    import os\n    return\
          \ os.environ.get(var_name, 'UNSET')\n\n"
        env:
        - name: KFP_TEST_ENV_VAR
          value: env_var_value
        image: python:3.11
pipelineInfo:
  name: pipeline-with-env-variable
root:
  dag:
    outputs:
      parameters:
        Output:
          valueFromParameter:
            outputParameterKey: Output
            producerSubtask: read-env-var
    tasks:
      read-env-var:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-read-env-var
        inputs:
          parameters:
            var_name:
              componentInputParameter: var_name
        taskInfo:
          name: read-env-var
  inputDefinitions:
    parameters:
      var_name:
        defaultValue: KFP_TEST_ENV_VAR
        isOptional: true
        parameterType: STRING
  outputDefinitions:
    parameters:
      Output:
        parameterType: STRING
schemaVersion: 2.1.0
sdkVersion: kfp-2.15.2
