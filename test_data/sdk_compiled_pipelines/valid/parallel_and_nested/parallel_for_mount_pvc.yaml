# PIPELINE DEFINITION
# Name: pipeline-parallel-for-mount-pvc
# Description: Pipeline with 1 component inside ParallelFor using mount_pvc.
# Inputs:
#    my_pvc_name_suffix: str [Default: 'test-pvc']
components:
  comp-createpvc:
    executorLabel: exec-createpvc
    inputDefinitions:
      parameters:
        access_modes:
          description: Values for ``PersistentVolumeClaim.spec.accessModes``.
          parameterType: LIST
        annotations:
          description: 'Annotations for the PVC''s metadata. Corresponds to

            `PersistentVolumeClaim.metadata.annotations

            <https://kubernetes.io/docs/reference/kubernetes-api/config-and-storage-resources/persistent-volume-claim-v1/#PersistentVolumeClaim>`_.'
          isOptional: true
          parameterType: STRUCT
        data_source:
          description: 'Specifies the data source for the PVC. This can be used to

            create a PVC from a VolumeSnapshot or to clone an existing PVC.

            Should be a dictionary with ``''apiGroup''``, ``''kind''``, and

            ``''name''`` keys. For example:

            ``{''apiGroup'': ''snapshot.storage.k8s.io'', ''kind'': ''VolumeSnapshot'',
            ''name'': ''my-snapshot''}``.

            Corresponds to `PersistentVolumeClaim.spec.dataSource

            <https://kubernetes.io/docs/reference/kubernetes-api/config-and-storage-resources/persistent-volume-claim-v1/#PersistentVolumeClaimSpec>`_.'
          isOptional: true
          parameterType: STRUCT
        pvc_name:
          description: 'Name of the PVC. Corresponds to

            `PersistentVolumeClaim.metadata.name

            <https://kubernetes.io/docs/reference/kubernetes-api/config-and-storage-resources/persistent-volume-claim-v1/#PersistentVolumeClaim>`_.

            Only one of ``pvc_name`` and ``pvc_name_suffix`` can be provided.'
          isOptional: true
          parameterType: STRING
        pvc_name_suffix:
          description: 'Prefix to use for a dynamically generated name, which

            will take the form ``<argo-workflow-name>-<pvc_name_suffix>``. Only

            one of ``pvc_name`` and ``pvc_name_suffix`` can be provided.'
          isOptional: true
          parameterType: STRING
        size:
          description: 'The size of storage requested by the PVC that will be

            provisioned. For example, ``''5Gi''``. Corresponds to

            `PersistentVolumeClaim.spec.resources.requests.storage

            <https://kubernetes.io/docs/reference/kubernetes-api/config-and-storage-resources/persistent-volume-claim-v1/#PersistentVolumeClaimSpec>`_.'
          parameterType: STRING
        storage_class_name:
          defaultValue: ''
          description: 'Name of StorageClass from which to provision the PV

            to back the PVC. ``None`` indicates to use the cluster''s default

            storage_class_name. Set to ``''''`` for a statically specified PVC.'
          isOptional: true
          parameterType: STRING
        volume_name:
          description: 'Pre-existing PersistentVolume that should back the

            provisioned PersistentVolumeClaim. Used for statically

            specified PV only. Corresponds to

            `PersistentVolumeClaim.spec.volumeName

            <https://kubernetes.io/docs/reference/kubernetes-api/config-and-storage-resources/persistent-volume-claim-v1/#PersistentVolumeClaimSpec>`_.'
          isOptional: true
          parameterType: STRING
    outputDefinitions:
      parameters:
        name:
          parameterType: STRING
  comp-example-component:
    executorLabel: exec-example-component
    inputDefinitions:
      parameters:
        item:
          parameterType: STRING
    outputDefinitions:
      parameters:
        Output:
          parameterType: STRING
  comp-for-loop-2:
    dag:
      tasks:
        example-component:
          cachingOptions:
            enableCache: true
          componentRef:
            name: comp-example-component
          inputs:
            parameters:
              item:
                componentInputParameter: pipelinechannel--loop-item-param-1
          taskInfo:
            name: example-component
    inputDefinitions:
      parameters:
        pipelinechannel--createpvc-name:
          parameterType: STRING
        pipelinechannel--loop-item-param-1:
          parameterType: STRING
deploymentSpec:
  executors:
    exec-createpvc:
      container:
        image: argostub/createpvc
    exec-example-component:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - example_component
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.14.3'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef example_component(item: str) -> str:\n    print(f\"Item: {item}\"\
          )\n    return item\n\n"
        image: python:3.11
pipelineInfo:
  description: Pipeline with 1 component inside ParallelFor using mount_pvc.
  name: pipeline-parallel-for-mount-pvc
root:
  dag:
    tasks:
      createpvc:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-createpvc
        inputs:
          parameters:
            access_modes:
              runtimeValue:
                constant:
                - ReadWriteOnce
            pvc_name_suffix:
              runtimeValue:
                constant: -my-pvc
            size:
              runtimeValue:
                constant: 5Mi
            storage_class_name:
              runtimeValue:
                constant: standard
        taskInfo:
          name: createpvc
      for-loop-2:
        componentRef:
          name: comp-for-loop-2
        dependentTasks:
        - createpvc
        inputs:
          parameters:
            pipelinechannel--createpvc-name:
              taskOutputParameter:
                outputParameterKey: name
                producerTask: createpvc
        parameterIterator:
          itemInput: pipelinechannel--loop-item-param-1
          items:
            raw: '["a"]'
        taskInfo:
          name: for-loop-2
  inputDefinitions:
    parameters:
      my_pvc_name_suffix:
        defaultValue: test-pvc
        isOptional: true
        parameterType: STRING
schemaVersion: 2.1.0
sdkVersion: kfp-2.13.0
---
platforms:
  kubernetes:
    deploymentSpec:
      executors:
        exec-example-component:
          pvcMount:
          - componentInputParameter: pipelinechannel--createpvc-name
            mountPath: /data
            pvcNameParameter:
              componentInputParameter: pipelinechannel--createpvc-name
