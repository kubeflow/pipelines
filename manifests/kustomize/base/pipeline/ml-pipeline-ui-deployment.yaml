apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: ml-pipeline-ui
  name: ml-pipeline-ui
spec:
  selector:
    matchLabels:
      app: ml-pipeline-ui
  template:
    metadata:
      labels:
        app: ml-pipeline-ui
      annotations:
        cluster-autoscaler.kubernetes.io/safe-to-evict: "true"
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      volumes:
      - name: config-volume
        configMap:
          name: ml-pipeline-ui-configmap
      containers:
      - image: ghcr.io/kubeflow/kfp-frontend:dummy
        imagePullPolicy: IfNotPresent
        name: ml-pipeline-ui
        ports:
        - containerPort: 3000
        volumeMounts:
        - name: config-volume
          mountPath: /etc/config
          readOnly: true
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 1000
          runAsGroup: 0
          capabilities:
            drop:
            - ALL
          seccompProfile:
            type: RuntimeDefault
        env:
          - name: VIEWER_TENSORBOARD_POD_TEMPLATE_SPEC_PATH
            value: /etc/config/viewer-pod-template.json
          - name: MINIO_NAMESPACE
            valueFrom:
              fieldRef:
                fieldPath: metadata.namespace
          - name: MINIO_ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: mlpipeline-minio-artifact
                key: accesskey
          - name: MINIO_SECRET_KEY
            valueFrom:
              secretKeyRef:
                name: mlpipeline-minio-artifact
                key: secretkey
          - name: ALLOW_CUSTOM_VISUALIZATIONS
            value: "true"
          - name: FRONTEND_SERVER_NAMESPACE
            valueFrom:
              fieldRef:
                fieldPath: metadata.namespace
          - name: ARGO_ARCHIVE_LOGS
            value: "true"
          - name: DISABLE_GKE_METADATA
            value: "true"
          # Namespace-ownership resolution for artifacts the metadata store does not track
          # (for example pod logs and other objects legitimately absent from the metadata
          # store). The default "mlmd-then-prefix" derives the owning namespace from the
          # "private-artifacts/<namespace>/" object-key prefix, restoring v1 and v2 artifact
          # retrieval while still blocking cross-namespace access; an object that carries no
          # such prefix has no derivable owner and is denied, because nothing is ever written
          # to the bucket root. Set to "mlmd-only" to enforce the strict guard that denies
          # every artifact absent from the metadata store.
          - name: ARTIFACT_NAMESPACE_OWNERSHIP_MODE
            value: "mlmd-then-prefix"
          - name: CLUSTER_DOMAIN
            valueFrom:
              configMapKeyRef:
                name: pipeline-install-config
                key: CLUSTER_DOMAIN
                optional: true
          - name: ARTIFACTS_SERVICE_PROXY_ENABLED
            valueFrom:
              configMapKeyRef:
                name: pipeline-install-config
                key: ARTIFACTS_PROXY_ENABLED
                optional: true
        readinessProbe:
          httpGet:
            path: /apis/v1beta1/healthz
            port: 3000
          initialDelaySeconds: 3
          periodSeconds: 5
          timeoutSeconds: 2
        livenessProbe:
          httpGet:
            path: /apis/v1beta1/healthz
            port: 3000
          initialDelaySeconds: 3
          periodSeconds: 5
          timeoutSeconds: 2
        resources:
          requests:
            cpu: 10m
            memory: 70Mi
      serviceAccountName: ml-pipeline-ui
