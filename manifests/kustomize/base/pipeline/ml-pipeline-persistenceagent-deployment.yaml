apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: ml-pipeline-persistenceagent
  name: ml-pipeline-persistenceagent
spec:
  selector:
    matchLabels:
      app: ml-pipeline-persistenceagent
  template:
    metadata:
      labels:
        app: ml-pipeline-persistenceagent
      annotations:
        cluster-autoscaler.kubernetes.io/safe-to-evict: "true"
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      # Init container template: keep securityContext, resources, and script
      # in sync across all wait-for-* containers in this repo.
      initContainers:
      - name: wait-for-ml-pipeline
        image: docker.io/alpine:3.23
        securityContext:
          allowPrivilegeEscalation: false
          seccompProfile:
            type: RuntimeDefault
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop:
            - ALL
        resources:
          requests:
            cpu: 10m
            memory: 16Mi
          limits:
            cpu: 100m
            memory: 64Mi
        env:
        - name: WAIT_HOST
          value: ml-pipeline
        - name: WAIT_PORT
          value: "8888"
        command: ["/bin/sh", "-ec"]
        args:
          - |
            if [ -z "${WAIT_HOST}" ] || [ -z "${WAIT_PORT}" ]; then
              echo "ERROR: WAIT_HOST or WAIT_PORT is not set."
              exit 1
            fi
            MAX_RETRIES=60; i=0
            while ! nc -z -w 2 "${WAIT_HOST}" "${WAIT_PORT}"; do
              i=$((i+1))
              if [ "$i" -ge "$MAX_RETRIES" ]; then
                echo "ERROR: Timed out waiting for ${WAIT_HOST}:${WAIT_PORT} after ${MAX_RETRIES} attempts."
                exit 1
              fi
              echo "Waiting for ${WAIT_HOST}:${WAIT_PORT} (attempt ${i}/${MAX_RETRIES})..."
              sleep 5
            done
      containers:
      - env:
          - name: NAMESPACE
            valueFrom:
              fieldRef:
                fieldPath: metadata.namespace
          - name: TTL_SECONDS_AFTER_WORKFLOW_FINISH
            value: "86400"
          - name: NUM_WORKERS
            value: "2"
          - name: LOG_LEVEL
            value: "info"
        image: ghcr.io/kubeflow/kfp-persistence-agent:dummy
        imagePullPolicy: IfNotPresent
        name: ml-pipeline-persistenceagent
        resources:
          requests:
            cpu: 120m
            memory: 500Mi
        volumeMounts:
          - mountPath: /var/run/secrets/kubeflow/tokens
            name: persistenceagent-sa-token
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 1000
          runAsGroup: 0
          capabilities:
            drop:
            - ALL
          seccompProfile:
            type: RuntimeDefault
      serviceAccountName: ml-pipeline-persistenceagent
      volumes:
        - name: persistenceagent-sa-token
          projected:
            sources:
              - serviceAccountToken:
                  path: persistenceagent-sa-token
                  expirationSeconds: 3600
                  audience: pipelines.kubeflow.org
