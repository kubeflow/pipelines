apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: ml-pipeline
  name: ml-pipeline
spec:
  selector:
    matchLabels:
      app: ml-pipeline
  template:
    metadata:
      labels:
        app: ml-pipeline
      annotations:
        cluster-autoscaler.kubernetes.io/safe-to-evict: "true"
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      # Init container template: keep securityContext, resources, and script
      # in sync across all wait-for-* containers in this repo.
      initContainers:
      - name: wait-for-database
        image: docker.io/alpine:3.23
        securityContext:
          allowPrivilegeEscalation: false
          seccompProfile:
            type: RuntimeDefault
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop:
            - ALL
        resources:
          requests:
            cpu: 10m
            memory: 16Mi
          limits:
            cpu: 100m
            memory: 64Mi
        env:
        - name: WAIT_HOST
          valueFrom:
            configMapKeyRef:
              name: pipeline-install-config
              key: dbHost
        - name: WAIT_PORT
          valueFrom:
            configMapKeyRef:
              name: pipeline-install-config
              key: dbPort
        command: ["/bin/sh", "-ec"]
        args:
          - |
            if [ -z "${WAIT_HOST}" ] || [ -z "${WAIT_PORT}" ]; then
              echo "ERROR: WAIT_HOST or WAIT_PORT is not set."
              exit 1
            fi
            MAX_RETRIES=60; i=0
            while ! nc -z -w 2 "${WAIT_HOST}" "${WAIT_PORT}"; do
              i=$((i+1))
              if [ "$i" -ge "$MAX_RETRIES" ]; then
                echo "ERROR: Timed out waiting for ${WAIT_HOST}:${WAIT_PORT} after ${MAX_RETRIES} attempts."
                exit 1
              fi
              echo "Waiting for ${WAIT_HOST}:${WAIT_PORT} (attempt ${i}/${MAX_RETRIES})..."
              sleep 5
            done
      - name: wait-for-metadata-grpc
        image: docker.io/alpine:3.23
        securityContext:
          allowPrivilegeEscalation: false
          seccompProfile:
            type: RuntimeDefault
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop:
            - ALL
        resources:
          requests:
            cpu: 10m
            memory: 16Mi
          limits:
            cpu: 100m
            memory: 64Mi
        env:
        - name: WAIT_HOST
          value: metadata-grpc-service
        - name: WAIT_PORT
          value: "8080"
        command: ["/bin/sh", "-ec"]
        args:
          - |
            if [ -z "${WAIT_HOST}" ] || [ -z "${WAIT_PORT}" ]; then
              echo "ERROR: WAIT_HOST or WAIT_PORT is not set."
              exit 1
            fi
            MAX_RETRIES=60; i=0
            while ! nc -z -w 2 "${WAIT_HOST}" "${WAIT_PORT}"; do
              i=$((i+1))
              if [ "$i" -ge "$MAX_RETRIES" ]; then
                echo "ERROR: Timed out waiting for ${WAIT_HOST}:${WAIT_PORT} after ${MAX_RETRIES} attempts."
                exit 1
              fi
              echo "Waiting for ${WAIT_HOST}:${WAIT_PORT} (attempt ${i}/${MAX_RETRIES})..."
              sleep 5
            done
      containers:
        - env:
            # Whether or not to publish component logs to the object store.
            - name: PUBLISH_LOGS
              value: "true"
            - name: LOG_LEVEL
              value: "info"
            # Driver / launcher log level during pipeline execution
            - name: PIPELINE_LOG_LEVEL
              value: "1"
            - name: AUTO_UPDATE_PIPELINE_DEFAULT_VERSION
              valueFrom:
                configMapKeyRef:
                  name: pipeline-install-config
                  key: autoUpdatePipelineDefaultVersion
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: CLUSTER_DOMAIN
              value: "cluster.local"
            - name: OBJECTSTORECONFIG_SECURE
              value: "false"
            - name: OBJECTSTORECONFIG_BUCKETNAME
              valueFrom:
                configMapKeyRef:
                  name: pipeline-install-config
                  key: bucketName
            - name: OBJECTSTORECONFIG_HOST
              value: "seaweedfs.kubeflow"
            - name: OBJECTSTORECONFIG_PORT
              value: "9000"
            # relic variables
            - name: DBCONFIG_USER
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: username
            - name: DBCONFIG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: password
            - name: DBCONFIG_DBNAME
              valueFrom:
                configMapKeyRef:
                  name: pipeline-install-config
                  key: pipelineDb
            - name: DBCONFIG_HOST
              valueFrom:
                configMapKeyRef:
                  name: pipeline-install-config
                  key: dbHost
            - name: DBCONFIG_PORT
              valueFrom:
                configMapKeyRef:
                  name: pipeline-install-config
                  key: dbPort
            # end of relic variables
            - name: DBCONFIG_CONMAXLIFETIME
              valueFrom:
                configMapKeyRef:
                  name: pipeline-install-config
                  key: ConMaxLifeTime
            - name: DB_DRIVER_NAME
              valueFrom:
                configMapKeyRef:
                  name: pipeline-install-config
                  key: dbType
            # MySQL Config
            - name: DBCONFIG_MYSQLCONFIG_USER
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: username
            - name: DBCONFIG_MYSQLCONFIG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: password
            - name: DBCONFIG_MYSQLCONFIG_DBNAME
              valueFrom:
                configMapKeyRef:
                  name: pipeline-install-config
                  key: pipelineDb
            - name: DBCONFIG_MYSQLCONFIG_HOST
              valueFrom:
                configMapKeyRef:
                  name: pipeline-install-config
                  key: mysqlHost
            - name: DBCONFIG_MYSQLCONFIG_PORT
              valueFrom:
                configMapKeyRef:
                  name: pipeline-install-config
                  key: mysqlPort
            # end of MySQL Config
            - name: OBJECTSTORECONFIG_ACCESSKEY
              valueFrom:
                secretKeyRef:
                  name: mlpipeline-minio-artifact
                  key: accesskey
            - name: OBJECTSTORECONFIG_SECRETACCESSKEY
              valueFrom:
                secretKeyRef:
                  name: mlpipeline-minio-artifact
                  key: secretkey
            - name: V2_DRIVER_IMAGE
              value: ghcr.io/kubeflow/kfp-driver:2.16.0
            - name: V2_LAUNCHER_IMAGE
              value: ghcr.io/kubeflow/kfp-launcher:2.16.0
            # JSON patch to apply to compiled workflow specifications
            - name: COMPILED_PIPELINE_SPEC_PATCH
              value: "{}"
            - name: DEFAULT_SECURITY_CONTEXT_RUN_AS_USER
              valueFrom:
                configMapKeyRef:
                  name: pipeline-install-config
                  key: defaultSecurityContextRunAsUser
                  optional: true
            - name: DEFAULT_SECURITY_CONTEXT_RUN_AS_GROUP
              valueFrom:
                configMapKeyRef:
                  name: pipeline-install-config
                  key: defaultSecurityContextRunAsGroup
                  optional: true
            - name: DEFAULT_SECURITY_CONTEXT_RUN_AS_NON_ROOT
              valueFrom:
                configMapKeyRef:
                  name: pipeline-install-config
                  key: defaultSecurityContextRunAsNonRoot
                  optional: true
            - name: DEFAULT_SECURITY_CONTEXT_HOST_USERS
              valueFrom:
                configMapKeyRef:
                  name: pipeline-install-config
                  key: defaultSecurityContextHostUsers
                  optional: true
            - name: BLOCK_V1_PIPELINES
              valueFrom:
                configMapKeyRef:
                  name: pipeline-install-config
                  key: BLOCK_V1_PIPELINES
                  optional: true
            - name: V1_ALLOWED_NAMESPACES
              valueFrom:
                configMapKeyRef:
                  name: pipeline-install-config
                  key: V1_ALLOWED_NAMESPACES
                  optional: true
          image: ghcr.io/kubeflow/kfp-api-server:dummy
          imagePullPolicy: IfNotPresent
          name: ml-pipeline-api-server
          ports:
            - name: http
              containerPort: 8888
            - name: grpc
              containerPort: 8887
          readinessProbe:
            httpGet:
              path: /apis/v1beta1/healthz
              port: 8888
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 2
          livenessProbe:
            httpGet:
              path: /apis/v1beta1/healthz
              port: 8888
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 2
          # This startup probe provides up to a 60 second grace window before the
          # liveness probe takes over to accomodate the occasional database
          # migration.
          startupProbe:
            httpGet:
              path: /apis/v1beta1/healthz
              port: 8888
            failureThreshold: 12
            periodSeconds: 5
            timeoutSeconds: 2
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 0
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: 250m
              memory: 500Mi
      serviceAccountName: ml-pipeline
