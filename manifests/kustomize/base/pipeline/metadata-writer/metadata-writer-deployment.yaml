apiVersion: apps/v1
kind: Deployment
metadata:
  name: metadata-writer
  labels:
    app: metadata-writer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: metadata-writer
  template:
    metadata:
      labels:
        app: metadata-writer
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      # Init container template: keep securityContext, resources, and script
      # in sync across all wait-for-* containers in this repo.
      initContainers:
      - name: wait-for-metadata-grpc
        image: docker.io/alpine:3.23
        securityContext:
          allowPrivilegeEscalation: false
          seccompProfile:
            type: RuntimeDefault
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop:
            - ALL
        resources:
          requests:
            cpu: 10m
            memory: 16Mi
          limits:
            cpu: 100m
            memory: 64Mi
        env:
        - name: WAIT_HOST
          value: metadata-grpc-service
        - name: WAIT_PORT
          value: "8080"
        command: ["/bin/sh", "-ec"]
        args:
          - |
            if [ -z "${WAIT_HOST}" ] || [ -z "${WAIT_PORT}" ]; then
              echo "ERROR: WAIT_HOST or WAIT_PORT is not set."
              exit 1
            fi
            MAX_RETRIES=60; i=0
            while ! nc -z -w 2 "${WAIT_HOST}" "${WAIT_PORT}"; do
              i=$((i+1))
              if [ "$i" -ge "$MAX_RETRIES" ]; then
                echo "ERROR: Timed out waiting for ${WAIT_HOST}:${WAIT_PORT} after ${MAX_RETRIES} attempts."
                exit 1
              fi
              echo "Waiting for ${WAIT_HOST}:${WAIT_PORT} (attempt ${i}/${MAX_RETRIES})..."
              sleep 5
            done
      containers:
      - name: main
        image: ghcr.io/kubeflow/kfp-metadata-writer:dummy
        env:
        - name: NAMESPACE_TO_WATCH
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 1000
          runAsGroup: 0
          capabilities:
            drop:
            - ALL
          seccompProfile:
            type: RuntimeDefault
      serviceAccountName: kubeflow-pipelines-metadata-writer
