apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-pipeline-scheduledworkflow
spec:
  template:
    spec:
      containers:
      - name: ml-pipeline-scheduledworkflow
        env:
        - name: NAMESPACE
          value: '' # Empty namespace lets viewer controller watch all namespaces
          valueFrom: null # HACK: https://github.com/kubernetes-sigs/kustomize/issues/2606
        - name: NAMESPACE_SELF
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        # Inject the controller's own service-account identity as the user identity
        # header so CreateRun calls pass the API server's multi-user authorization.
        # The controller maps these environment variables to its --userIdentityHeader/--userIdentityValue
        # flags (see backend/Dockerfile.scheduledworkflow).
        # USER_IDENTITY_HEADER is sourced from the shared pipeline-install-config
        # ConfigMap so it stays in synchronization with the API server's
        # USERID_HEADER; operators patch the ConfigMap once to update both
        # deployments. The key is optional so the controller falls back to its own
        # default header when it is unset.
        - name: USER_IDENTITY_HEADER
          valueFrom:
            configMapKeyRef:
              name: pipeline-install-config
              key: USERID_HEADER
              optional: true
        # SERVICE_ACCOUNT_NAME is resolved at runtime via the downward API so
        # renamed service accounts are handled automatically.
        - name: SERVICE_ACCOUNT_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.serviceAccountName
        - name: USER_IDENTITY_VALUE
          value: system:serviceaccount:$(NAMESPACE_SELF):$(SERVICE_ACCOUNT_NAME)
