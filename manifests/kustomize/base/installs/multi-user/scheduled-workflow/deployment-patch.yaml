apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-pipeline-scheduledworkflow
spec:
  template:
    spec:
      containers:
      - name: ml-pipeline-scheduledworkflow
        env:
        - name: NAMESPACE
          value: '' # Empty namespace let viewer controller watch all namespaces
          valueFrom: null # HACK: https://github.com/kubernetes-sigs/kustomize/issues/2606
        - name: NAMESPACE_SELF
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        # Inject the controller's own service-account identity as the user identity
        # header so CreateRun calls pass the API server's multi-user authorization.
        # The controller maps these env vars to its --userIdentityHeader/--userIdentityValue
        # flags (see backend/Dockerfile.scheduledworkflow).
        - name: USER_IDENTITY_HEADER
          value: kubeflow-userid
        - name: USER_IDENTITY_VALUE
          value: system:serviceaccount:$(NAMESPACE_SELF):ml-pipeline-scheduledworkflow
