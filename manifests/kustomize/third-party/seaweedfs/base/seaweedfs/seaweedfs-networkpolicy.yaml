apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: seaweedfs
spec:
  ingress:
  - from:
    - namespaceSelector:
        matchExpressions:
        - key: app.kubernetes.io/part-of
          operator: In
          values:
          - kubeflow-profile
    ports:
    - port: 8333
  - from:
    - namespaceSelector:
        matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: In
          values:
          - istio-system
  - from:
    - podSelector: {}
    ports:
    - port: 8333
  # The same-namespace rule above covers only S3. Keep IAM access scoped to
  # the profile controller instead of exposing port 8111 to every local pod.
  - from:
    - podSelector:
        matchLabels:
          app: kubeflow-pipelines-profile-controller
    ports:
    - port: 8111
  podSelector:
    matchExpressions:
    - key: app
      operator: In
      values:
      - seaweedfs
  policyTypes:
  - Ingress
