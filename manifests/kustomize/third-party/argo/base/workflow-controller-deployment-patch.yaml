apiVersion: apps/v1
kind: Deployment
metadata:
  name: workflow-controller
spec:
  template:
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: workflow-controller
          image: quay.io/argoproj/workflow-controller:v3.7.3
          args:
            - --configmap
            - workflow-controller-configmap
            - --executor-image
            - quay.io/argoproj/argoexec:v3.7.3
          env:
            # https://argo-workflows.readthedocs.io/en/latest/environment-variables/
            - name: ARGO_EXECUTOR_PLUGINS
              value: "true"
            - name: DEFAULT_REQUEUE_TIME
              value: "6s"
          securityContext:
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 100m
              memory: 500Mi
