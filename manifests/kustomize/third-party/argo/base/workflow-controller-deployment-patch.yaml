apiVersion: apps/v1
kind: Deployment
metadata:
  name: workflow-controller
spec:
  template:
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: workflow-controller
          image: quay.io/argoproj/workflow-controller:v3.7.14
          args:
            - --configmap
            - workflow-controller-configmap
            - --executor-image
            - quay.io/argoproj/argoexec:v3.7.14
          env:
          - name: TRANSIENT_ERROR_PATTERN
            value: >-
              (?i)(imminent node shutdown|node is shutting down|preempt|evict|spot|pod deleted)
          # https://argo-workflows.readthedocs.io/en/latest/environment-variables/
          - name: ARGO_EXECUTOR_PLUGINS
            value: "true"
          - name: DEFAULT_REQUEUE_TIME
            value: "6s"
          securityContext:
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: 100m
              memory: 500Mi
