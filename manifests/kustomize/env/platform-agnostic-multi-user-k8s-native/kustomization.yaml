apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../third-party/metacontroller/base
  - ../../base/crds
  - ../../base/installs/multi-user
  - ../../base/metadata/base
  - ../../base/metadata/options/istio
  - ../../third-party/argo/installs/cluster
  - ../../third-party/mysql/base
  - ../../third-party/mysql/options/istio
  - ../../third-party/minio/base
  - ../../third-party/minio/options/istio

# Identifier for application manager to apply ownerReference.
# The ownerReference ensures the resources get garbage collected
# when application is deleted.
commonLabels:
  application-crd-id: kubeflow-pipelines

# !!! If you want to customize the namespace,
# please also update base/cache-deployer/cluster-scoped/cache-deployer-clusterrolebinding.yaml
namespace: kubeflow

patches:
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: ml-pipeline
      spec:
        template:
          spec:
            containers:
              - name: ml-pipeline-api-server
                command:
                  - /bin/apiserver
                args:
                  - '--config=/config'
                  - '--sampleconfig=/config/sample_config.json'
                  - '-logtostderr=true'
                  - '--logLevel=debug'
                  - '--pipelinesStoreKubernetes=true'
  - patch: |
      - op: add
        path: "/rules/-"
        value:
          verbs:
            - create
            - get
            - list
            - watch
            - update
            - patch
            - delete
          apiGroups:
            - pipelines.kubeflow.org
          resources:
            - pipelines
            - pipelines/status
      - op: add
        path: "/rules/-"
        value:
          verbs:
            - create
            - get
            - list
            - watch
            - update
            - patch
            - delete
          apiGroups:
            - pipelines.kubeflow.org
          resources:
            - pipelineversions
            - pipelineversions/status
    target:
      group: rbac.authorization.k8s.io
      version: v1
      kind: Role
      name: ml-pipeline
