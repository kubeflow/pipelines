apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
# Application controller is used to provide Google Cloud Console integration.
- ../../third-party/application
- ../../base/application
- ../../base/installs/generic
- ../../third-party/argo/installs/namespace
- inverse-proxy
- cloudsql-proxy


# !!! If you want to customize the namespace,
# please also update base/cache-deployer/cluster-scoped/cache-deployer-clusterrolebinding.yaml
namespace: kubeflow

patches:
- path: gcp-configurations-patch.yaml

# Used by Kustomize
configMapGenerator:
- behavior: merge
  envs:
  - params.env
  name: pipeline-install-config

# Identifier for application manager to apply ownerReference.
# The ownerReference ensures the resources get garbage collected
# when application is deleted.
labels:
- includeSelectors: true
  pairs:
    application-crd-id: kubeflow-pipelines

replacements:
- source:
    kind: ConfigMap
    name: pipeline-install-config
    fieldPath: data.appName
  targets:
  - select:
      kind: Application
    fieldPaths:
    - metadata.name

- source:
    kind: ConfigMap
    name: pipeline-install-config
    fieldPath: data.appVersion
  targets:
  - select:
      kind: Application
    fieldPaths:
    - spec.descriptor.version

- source:
    kind: ConfigMap
    name: pipeline-install-config
    fieldPath: metadata.namespace
  targets:
  - select:
      kind: ConfigMap
      name: workflow-controller-configmap
    fieldPaths:
    - data.artifactRepository
    options:
      delimiter: .
      index: 1

- source:
    kind: ConfigMap
    name: pipeline-install-config
    fieldPath: data.bucketName
  targets:
  - select:
      kind: ConfigMap
      name: workflow-controller-configmap
    fieldPaths:
    - data.artifactRepository
    options:
      delimiter: '"'
      index: 3
