apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../../../base/crds
- ../../platform-agnostic
- ../../../base/webhook
- ../base-webhook-certs/

# !!! If you want to customize the namespace,
# please also update base/cache-deployer/cluster-scoped/cache-deployer-clusterrolebinding.yaml
namespace: kubeflow


replacements:
# cert-manager.io/inject-ca-from must be namespace/name of the Certificate; annotation
# keys with dots require bracket notation in fieldPaths (not metadata.annotations.cert-manager.io/...).
- source:
    kind: Certificate
    name: kfp-api-webhook-cert
    fieldPath: metadata.namespace
  targets:
  - select:
      kind: ValidatingWebhookConfiguration
      name: pipelineversions.pipelines.kubeflow.org
    fieldPaths:
    - metadata.annotations.[cert-manager.io/inject-ca-from]
    options:
      delimiter: /
      index: 0
  - select:
      kind: MutatingWebhookConfiguration
      name: pipelineversions.pipelines.kubeflow.org
    fieldPaths:
    - metadata.annotations.[cert-manager.io/inject-ca-from]
    options:
      delimiter: /
      index: 0

- source:
    kind: Certificate
    name: kfp-api-webhook-cert
    fieldPath: metadata.name
  targets:
  - select:
      kind: ValidatingWebhookConfiguration
      name: pipelineversions.pipelines.kubeflow.org
    fieldPaths:
    - metadata.annotations.[cert-manager.io/inject-ca-from]
    options:
      delimiter: /
      index: 1
  - select:
      kind: MutatingWebhookConfiguration
      name: pipelineversions.pipelines.kubeflow.org
    fieldPaths:
    - metadata.annotations.[cert-manager.io/inject-ca-from]
    options:
      delimiter: /
      index: 1

# Webhooks are included in this overlay, not under base/installs/generic; substitute
# NAMESPACE_PLACEHOLDER using the apiserver deployment namespace.
- source:
    kind: Deployment
    name: ml-pipeline
    fieldPath: metadata.namespace
  targets:
  - select:
      kind: MutatingWebhookConfiguration
      name: pipelineversions.pipelines.kubeflow.org
    fieldPaths:
    - webhooks.*.clientConfig.service.namespace
  - select:
      kind: ValidatingWebhookConfiguration
      name: pipelineversions.pipelines.kubeflow.org
    fieldPaths:
    - webhooks.*.clientConfig.service.namespace

patches:
  - path: patches/deployment.yaml
    target:
      kind: Deployment
      name: ml-pipeline
  # This must use a JSON patch to ensure the webhook port is added last, otherwise it can be added first, which
  # affects the service default port automatically detected by the UI.
  - path: patches/service.json
    target:
      kind: Service
      name: ml-pipeline
  - path: patches/validating-webhook.yaml
    target:
      kind: ValidatingWebhookConfiguration
      name: pipelineversions.pipelines.kubeflow.org
  - path: patches/mutating-webhook.yaml
    target:
      kind: MutatingWebhookConfiguration
      name: pipelineversions.pipelines.kubeflow.org
  - path: patches/role.yaml
    target:
      group: rbac.authorization.k8s.io
      version: v1
      kind: Role
      name: ml-pipeline
