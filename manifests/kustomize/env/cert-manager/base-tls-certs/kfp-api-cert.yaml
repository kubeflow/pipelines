apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: kfp-api-tls-cert
spec:
  commonName: kfp-api-tls-cert
  isCA: true
  dnsNames:
    - ml-pipeline
    - ml-pipeline.$(kfp-namespace)
    - ml-pipeline.$(kfp-namespace).svc
    - ml-pipeline-scheduledworkflow
    - ml-pipeline-scheduledworkflow.$(kfp-namespace)
    - ml-pipeline-scheduledworkflow.$(kfp-namespace).svc
    - metadata-envoy
    - metadata-envoy.$(kfp-namespace)
    - metadata-envoy.$(kfp-namespace).svc
  issuerRef:
    kind: Issuer
    name: kfp-api-tls-selfsigned-issuer
  secretName: kfp-api-tls-cert
