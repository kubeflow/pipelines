apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: kfp-api-tls-cert
spec:
  commonName: kfp-api-tls-cert
  isCA: true
  dnsNames:
    - ml-pipeline
    - ml-pipeline.kubeflow
    - ml-pipeline.kubeflow.svc.cluster.local
    - ml-pipeline-scheduledworkflow
    - metadata-envoy
    - metadata-envoy-service
    - metadata-grpc-service
    - metadata-grpc-service.kubeflow
    # localhost included here because cert is used in KFP pod-to-pod TLS-enabled testing against localhost base URL
    - localhost
    # added to bypass errors in ci build with replacement of vars with replacements
    - metadata-grpc-service.kubeflow.svc
    - metadata-grpc-service.kubeflow.svc.cluster.local
  ipAddresses:
    # Necessary for running TLS-enabled cluster locally.
    - 127.0.0.1
  issuerRef:
    kind: Issuer
    name: kfp-api-tls-selfsigned-issuer
  secretName: kfp-api-tls-cert
