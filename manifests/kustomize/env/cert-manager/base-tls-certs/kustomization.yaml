apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ./kfp-api-cert-issuer.yaml
- ./kfp-api-cert.yaml

namespace: kubeflow

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
- name: kfp-cert-manager-tls-params
  literals:
  - namespace=kubeflow

replacements:
- source:
    kind: ConfigMap
    name: kfp-cert-manager-tls-params
    fieldPath: data.namespace
  targets:
  - select:
      kind: Certificate
      name: kfp-api-tls-cert
    fieldPaths:
    - spec.dnsNames.1
    - spec.dnsNames.2
    - spec.dnsNames.3
    - spec.dnsNames.8
    - spec.dnsNames.9
    - spec.dnsNames.10
    options:
      delimiter: .
      index: 1
