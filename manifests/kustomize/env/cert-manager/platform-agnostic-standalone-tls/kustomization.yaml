apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../../base/crds
  - ../../platform-agnostic
  - ../base-tls-certs/
  - patches/cluster-role-scheduledworkflow.yaml
  - patches/cluster-rolebinding-scheduledworkflow.yaml
  - patches/grpc-tls-config.yaml
  - patches/grpc-config-writer.yaml
  - patches/envoy-config-tls-enabled.yaml

namespace: kubeflow

patches:
  - path: patches/apiserver-deployment.yaml
    target:
      kind: Deployment
      name: ml-pipeline
  - path: patches/apiserver-service.yaml
    target:
      kind: Service
      name: ml-pipeline
  - path: patches/scheduledworkflow-deployment.yaml
    target:
      kind: Deployment
      name: ml-pipeline-scheduledworkflow
  - path: patches/metadata-envoy-deployment.yaml
    target:
      kind: Deployment
      name: metadata-envoy-deployment
  - path: patches/metadata-grpc-deployment.yaml
    target:
      kind: Deployment
      name: metadata-grpc-deployment
  - patch: |-
      - op: add
        path: /spec/template/spec/containers/0/args/-
        value: "--metadata_store_server_config_file=/etc/grpc/config.proto"
    target:
      kind: Deployment
      name: metadata-grpc-deployment
  - path: patches/persistence-agent-deployment.yaml
    target:
      kind: Deployment
      name: ml-pipeline-persistenceagent