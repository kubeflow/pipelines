apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../../base/crds
  - ../../platform-agnostic
  - ../base-tls-certs/


# !!! If you want to customize the namespace,
# please also update base/cache-deployer/cluster-scoped/cache-deployer-clusterrolebinding.yaml
namespace: kubeflow

configMapGenerator:
  - name: envoy-tls-config
    files:
      - patches/envoy-tls-enabled.yaml
  - name: grpc-tls-config
    files:
      - patches/grpc-tls-enabled.yaml

patches:
  - path: patches/apiserver-deployment.yaml
    target:
      kind: Deployment
      name: ml-pipeline
  - path: patches/scheduledworkflow-deployment.yaml
    target:
      kind: Deployment
      name: ml-pipeline-scheduledworkflow
  - path: patches/metadata-envoy-deployment.yaml
    target:
      kind: Deployment
      name: metadata-envoy-deployment
  - path: patches/metadata-grpc-deployment.yaml
    target:
      kind: Deployment
      name: metadata-grpc-deployment
  - path: patches/apiserver-service.yaml
    target:
      kind: Service
      name: ml-pipeline