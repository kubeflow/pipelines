apiVersion: v1
kind: ConfigMap
metadata:
  name: ml-pipeline-driver-agent
data:
  sidecar.automountServiceAccountToken: "true"
  sidecar.container: |
    name: driver-plugin
    image:  ghcr.io/kubeflow/kfp-driver:dummy
    env:
      - name: LOG_ACCESS_KEY
        valueFrom:
          secretKeyRef:
            name: mlpipeline-minio-artifact
            key: accesskey
      - name: LOG_SECRET_KEY
        valueFrom:
          secretKeyRef:
            name: mlpipeline-minio-artifact
            key: secretkey
    ports:
      - containerPort: 8080
    resources:
      limits:
        cpu: "1"
        memory: 1Gi
      requests:
        cpu: 250m
        memory: 512Mi
    securityContext:
      runAsNonRoot: true
      runAsUser: 65534
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      seccompProfile:
        type: RuntimeDefault
    volumeMounts:
    - name: argo-workflows-agent-ca-certificates
      mountPath: /kfp/certs
      readOnly: true
    - name: var-run-argo
      mountPath: /kfp/log
      readOnly: false
