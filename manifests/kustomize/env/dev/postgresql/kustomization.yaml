apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
# Application controller is used to provide Google Cloud Console integration.
- ../../../third-party/application
- ../../../base/application
- ../../platform-agnostic-postgresql
- ../../gcp/inverse-proxy

# !!! If you want to customize the namespace,
# please refer sample/cluster-scoped-resources to update the namespace for cluster-scoped-resources
namespace: kubeflow

# Identifier for application manager to apply ownerReference.
# The ownerReference ensures the resources get garbage collected
# when application is deleted.
labels:
- includeSelectors: true
  pairs:
    application-crd-id: kubeflow-pipelines

replacements:
- source:
    kind: ConfigMap
    name: pipeline-install-config
    fieldPath: data.appName
  targets:
  - select:
      kind: Application
    fieldPaths:
    - metadata.name

- source:
    kind: ConfigMap
    name: pipeline-install-config
    fieldPath: data.appVersion
  targets:
  - select:
      kind: Application
    fieldPaths:
    - spec.descriptor.version

# PostgreSQL sslmode: the base platform-agnostic-postgresql overlay intentionally
# leaves sslmode unset so that CreatePostgreSQLConfig fails fast (secure-by-default).
# This development overlay explicitly opts into sslmode=disable.
patches:
- patch: |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: ml-pipeline
      namespace: kubeflow
    spec:
      template:
        spec:
          containers:
            - name: ml-pipeline-api-server
              env:
                - name: DBCONFIG_POSTGRESQLCONFIG_EXTRAPARAMS
                  value: '{"sslmode":"disable"}'
- patch: |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: cache-server
      namespace: kubeflow
    spec:
      template:
        spec:
          containers:
            - name: server
              args:
                - "--db_driver=$(DBCONFIG_DRIVER)"
                - "--db_host=$(DBCONFIG_POSTGRESQLCONFIG_HOST)"
                - "--db_port=$(DBCONFIG_POSTGRESQLCONFIG_PORT)"
                - "--db_name=$(DBCONFIG_DB_NAME)"
                - "--db_user=$(DBCONFIG_POSTGRESQLCONFIG_USER)"
                - "--db_password=$(DBCONFIG_POSTGRESQLCONFIG_PASSWORD)"
                - "--db_extra_params={\"sslmode\":\"disable\"}"
                - "--namespace_to_watch=$(NAMESPACE_TO_WATCH)"
                - "--listen_port=$(WEBHOOK_PORT)"
