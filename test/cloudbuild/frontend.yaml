steps:
  - id: "frontend"
    name: "gcr.io/cloud-builders/docker"
    entrypoint: bash
    args:
      - -ec
      - |
        NODE_VERSION="$(tr -d 'v' < frontend/.nvmrc)"
        docker build -t "$_GCR_BASE/frontend" -f frontend/Dockerfile \
          --build-arg NODE_VERSION="${NODE_VERSION}" \
          --build-arg COMMIT_HASH=abcdefg \
          --build-arg TAG_NAME=1.0-dev .
images:
  - "$_GCR_BASE/frontend"
timeout: 1800s # 30min
