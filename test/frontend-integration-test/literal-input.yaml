# PIPELINE DEFINITION
# Name: literal-input-pipeline
# Inputs:
#    environment: str
components:
  comp-consumer:
    executorLabel: exec-consumer
    inputDefinitions:
      parameters:
        input_value:
          parameterType: STRING
  comp-producer:
    executorLabel: exec-producer
    inputDefinitions:
      parameters:
        input_text:
          parameterType: STRING
    outputDefinitions:
      parameters:
        output_value:
          parameterType: STRING
deploymentSpec:
  executors:
    exec-consumer:
      container:
        command:
        - sh
        - -c
        - 'set -e -x

          echo "Read from an input parameter: " && echo "$0"

          '
        - '{{$.inputs.parameters[''input_value'']}}'
        image: python:alpine3.9
    exec-producer:
      container:
        command:
        - sh
        - -c
        - 'set -e -x

          mkdir -p "$(dirname "$1")"

          echo "$0, this is an output parameter" > "$1"

          '
        - '{{$.inputs.parameters[''input_text'']}}'
        - '{{$.outputs.parameters[''output_value''].output_file}}'
        image: python:alpine3.9
pipelineInfo:
  name: literal-input-pipeline
root:
  dag:
    tasks:
      consumer:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-consumer
        dependentTasks:
        - producer
        inputs:
          parameters:
            input_value:
              taskOutputParameter:
                outputParameterKey: output_value
                producerTask: producer
        taskInfo:
          name: consumer
      producer:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-producer
        inputs:
          parameters:
            input_text:
              componentInputParameter: environment
        taskInfo:
          name: producer
  inputDefinitions:
    parameters:
      environment:
        literals:
        - dev
        - staging
        - prod
        parameterType: STRING
schemaVersion: 2.1.0
sdkVersion: kfp-2.14.6
