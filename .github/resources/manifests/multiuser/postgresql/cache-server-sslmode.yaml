apiVersion: apps/v1
kind: Deployment
metadata:
  name: cache-server
spec:
  template:
    spec:
      containers:
        - name: server
          # The base platform-agnostic-multi-user-postgresql overlay
          # intentionally leaves sslmode unset so that CreatePostgreSQLConfig
          # fails fast (secure-by-default). CI explicitly opts into
          # sslmode=disable via the --db_extra_params flag. Because a
          # strategic-merge patch replaces the args list wholesale, the full
          # argument list is repeated here.
          args:
            - "--db_driver=$(DBCONFIG_DRIVER)"
            - "--db_host=$(DBCONFIG_POSTGRESQLCONFIG_HOST)"
            - "--db_port=$(DBCONFIG_POSTGRESQLCONFIG_PORT)"
            - "--db_name=$(DBCONFIG_DB_NAME)"
            - "--db_user=$(DBCONFIG_POSTGRESQLCONFIG_USER)"
            - "--db_password=$(DBCONFIG_POSTGRESQLCONFIG_PASSWORD)"
            - "--db_extra_params={\"sslmode\":\"disable\"}"
            - "--namespace_to_watch=$(NAMESPACE_TO_WATCH)"
            - "--listen_port=$(WEBHOOK_PORT)"
