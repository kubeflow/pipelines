name: "Create Kind Cluster and Run Tests"
description: "Step to set up a kind cluster and run tests against it"

inputs:
  pipeline_store:
    description: "Flag to deploy KFP with K8s Native API"
    default: 'database'
    required: false
  proxy:
    description: "If KFP should be deployed with proxy configuration"
    required: false
    default: 'false'
  cache_enabled:
    description: "If KFP should be deployed with cache enabled globally"
    required: false
    default: 'true'
  multi_user:
    description: "If KFP should be deployed in multi-user mode"
    required: false
    default: 'false'
  user_namespace:
    description: "User namespace name if KFP was deployed in multi-user mode"
    required: false
    default: 'kubeflow-user-example-com'
  default_namespace:
    description: "Default namespace when deploying KFP on a Kind Cluster"
    required: false
    default: 'kubeflow'
  python_version:
    required: false
    default: '3.9'
    description: "Python version to use"
  report_python_version:
    required: false
    # Reporting uses a newer cached runtime to avoid setup-python
    # rate-limit downloads and to keep junit2html/junit summary tooling stable.
    default: '3.11'
    description: "Python version to use for test reporting steps"
  test_directory:
    required: true
    description: "Test Working Directory"
  num_parallel_nodes:
    required: false
    description: "Number of ginkgo nodes to run in parallel"
    default: "10"
  test_label:
    required: true
    description: "Test Label to filter on, for e.g. Regression, Smoke, APIServerTests etc."
  upload_pipelines_with_kubernetes_client:
    required: false
    default: 'false'
    description: "Set to true if you want to upload pipelines and pipeline versions with Native K8s API as CRDs"
  report_name:
    required: false
    default: ""
    description: "Override it if you want a custom name for your test report file"
  tls_enabled:
    description: "If KFP should be deployed with TLS pod-to-pod communication."
    required: false
    default: 'false'
  ca_cert_path:
    description: "Path to the CA certificate file."
    required: false
    default: ""
  # Deployment metadata inputs (from deploy action outputs)
  deployment_name:
    description: "Name of the KFP API server deployment/service (from deploy action)"
    required: false
    default: ""
  deployment_service_account_name:
    description: "Service account name from deployment (from deploy action)"
    required: false
    default: ""
  deployment_mode:
    description: "Deployment mode used - operator or direct (from deploy action)"
    required: false
    default: ""
  # Optional API overrides (for custom scenarios)
  api_url:
    description: "Override API server URL (leave empty for auto-detection)"
    required: false
    default: ""
  auth_token:
    description: "Override authentication token (leave empty for auto-generation)"
    required: false
    default: ""
  service_account_name:
    description: "Override service account name for pipeline execution (leave empty to use deployment SA)"
    required: false
    default: ""
  base_image:
    description: "Base container image for pipeline components"
    required: false
    default: ""
  skip_api_config:
    description: "Skip API access configuration and token generation (for tests that do not need a cluster)"
    required: false
    default: 'false'
  mlflow_enabled:
    description: "Whether MLflow is deployed and available for integration tests"
    required: false
    default: 'false'


runs:
  using: "composite"
  steps:
    - name: Start runner telemetry
      # Records runner-level CPU / memory / disk / network for the rest of the
      # job and renders charts into the job summary (post-hook). CI has no
      # metrics-server, so this is the only measurement of whether a lane
      # failure coincided with runner resource saturation — the discriminator
      # between app-level bottlenecks (e.g. MLflow worker queueing) and the
      # shared runner CPUs being pegged. No external service; summary only.
      uses: catchpoint/workflow-telemetry-action@94c3c3d9567a0205de6da68a76c428ce4e769af1 # v2.0.0
      with:
        comment_on_pr: false
      continue-on-error: true

    - name: Configure API Access
      id: configure-api
      if: ${{ inputs.skip_api_config != 'true' }}
      shell: bash
      env:
        INPUT_API_URL: ${{ inputs.api_url }}
        INPUT_TLS_ENABLED: ${{ inputs.tls_enabled }}
        INPUT_AUTH_TOKEN: ${{ inputs.auth_token }}
        INPUT_MULTI_USER: ${{ inputs.multi_user }}
        INPUT_SERVICE_ACCOUNT_NAME: ${{ inputs.service_account_name }}
        INPUT_DEPLOYMENT_SERVICE_ACCOUNT_NAME: ${{ inputs.deployment_service_account_name }}
        INPUT_DEPLOYMENT_NAME: ${{ inputs.deployment_name }}
        INPUT_DEFAULT_NAMESPACE: ${{ inputs.default_namespace }}
      run: |
        echo "Configuring API access for tests..."

        # Use provided API URL if available, otherwise detect from deployment
        if [ -n "$INPUT_API_URL" ]; then
          # Validate URL: must use http(s) scheme with safe characters only
          if ! echo "$INPUT_API_URL" | grep -qE '^https?://[A-Za-z0-9._:/@%?&=+-]+$'; then
            echo "Invalid API URL: contains disallowed characters or invalid scheme"
            exit 1
          fi
          API_URL="$INPUT_API_URL"
          echo "Using provided API URL: $API_URL"
        else
          # Auto-detect API URL based on TLS configuration
          TLS_ENABLED="$INPUT_TLS_ENABLED"
          if [ "$TLS_ENABLED" = "true" ]; then
            API_URL="https://localhost:8888"
          else
            API_URL="http://localhost:8888"
          fi
          echo "Auto-detected API URL: $API_URL"
        fi

        # Determine service account name (needed regardless of token source)
        if [ -n "$INPUT_SERVICE_ACCOUNT_NAME" ]; then
          SERVICE_ACCOUNT_NAME="$INPUT_SERVICE_ACCOUNT_NAME"
          echo "Using provided service account: $SERVICE_ACCOUNT_NAME"
        elif [ -n "$INPUT_DEPLOYMENT_SERVICE_ACCOUNT_NAME" ]; then
          SERVICE_ACCOUNT_NAME="$INPUT_DEPLOYMENT_SERVICE_ACCOUNT_NAME"
          echo "Using deployment service account: $SERVICE_ACCOUNT_NAME"
        else
          # Fallback based on deployment name
          DEPLOYMENT_NAME="${INPUT_DEPLOYMENT_NAME:-}"
          if [ -n "$DEPLOYMENT_NAME" ]; then
            SERVICE_ACCOUNT_NAME="$DEPLOYMENT_NAME"
            echo "Using deployment name as service account: $SERVICE_ACCOUNT_NAME"
          else
            SERVICE_ACCOUNT_NAME="pipeline-runner"  # Final fallback — matches the SA with workflow RBAC permissions
            echo "Using fallback service account: $SERVICE_ACCOUNT_NAME"
          fi
        fi

        # Use provided token if available, otherwise generate from service account
        # In multi-user mode without an explicit token, skip token generation here
        # and let the test code handle it via CreateUserToken with the user namespace/SA.
        MULTI_USER="${INPUT_MULTI_USER}"
        if [ -n "$INPUT_AUTH_TOKEN" ]; then
          API_TOKEN="$INPUT_AUTH_TOKEN"
          echo "Using provided auth token"
        elif [ "$MULTI_USER" = "true" ]; then
          API_TOKEN=""
          echo "Multi-user mode: skipping token generation, tests will create user token"
        else
          # Wait for deployment to be ready
          DEPLOYMENT_NAME="${INPUT_DEPLOYMENT_NAME:-}"
          DEFAULT_NAMESPACE="${INPUT_DEFAULT_NAMESPACE:-}"
          if [ -n "$DEPLOYMENT_NAME" ]; then
            echo "Waiting for service $DEPLOYMENT_NAME to be available..."
            end_time=$((SECONDS + 120))
            while [ $SECONDS -lt $end_time ]; do
              if kubectl get service "$DEPLOYMENT_NAME" -n "$DEFAULT_NAMESPACE" &> /dev/null; then
                break
              fi
              echo "Waiting for service $DEPLOYMENT_NAME..."
              sleep 10
            done
          fi

          # Generate API token
          echo "Generating token for $SERVICE_ACCOUNT_NAME..."
          API_TOKEN=$(kubectl create token "$SERVICE_ACCOUNT_NAME" --namespace "$DEFAULT_NAMESPACE" --duration=60m)
          if [ $? -eq 0 ]; then
            echo "Token generated successfully"
          else
            echo "Token generation failed"
            exit 1
          fi
        fi

        # Output for next step
        if [ -n "$API_TOKEN" ]; then
          echo "::add-mask::$API_TOKEN"
        fi
        echo "API_URL=$API_URL" >> "$GITHUB_OUTPUT"
        echo "API_TOKEN=$API_TOKEN" >> "$GITHUB_OUTPUT"
        echo "SERVICE_ACCOUNT_NAME=${SERVICE_ACCOUNT_NAME:-${INPUT_SERVICE_ACCOUNT_NAME:-}}" >> "$GITHUB_OUTPUT"

    - name: Run Tests
      id: run-tests
      shell: bash
      working-directory: ${{ inputs.test_directory }}
      env:
        PIPELINE_STORE: ${{ inputs.pipeline_store }}
        INPUT_API_URL: ${{ inputs.api_url }}
        INPUT_DEPLOYMENT_NAME: ${{ inputs.deployment_name }}
        INPUT_DEFAULT_NAMESPACE: ${{ inputs.default_namespace }}
      run: |
        USE_PROXY=${{ inputs.proxy }}
        if [ -z "$USE_PROXY" ]; then
            USE_PROXY='false'
        fi
        MULTI_USER=${{ inputs.multi_user}}
        if [ -z "$MULTI_USER" ]; then
          MULTI_USER='false'
        fi
        TLS_ENABLED=${{ inputs.tls_enabled }}
        if [ -z "$TLS_ENABLED" ]; then
          TLS_ENABLED='false'
        fi

        # Set API scheme and CA cert path based on TLS configuration
        if [[ "$TLS_ENABLED" == 'true' ]]; then
          API_SCHEME='https'
          CA_CERT_PATH=${{ inputs.ca_cert_path }}
          if [ -z "$CA_CERT_PATH" ]; then
            CA_CERT_PATH=''
          fi
        else
          API_SCHEME='http'
          CA_CERT_PATH=''  # Force empty when TLS is disabled
        fi
        pipelineStoreKubernetes='false'
        if [ "$PIPELINE_STORE" == "kubernetes" ]; then
          pipelineStoreKubernetes='true'
        fi
        PULL_NUMBER="${{ github.event.inputs.pull_number || github.event.pull_request.number }}"
        REPO_NAME="${{ github.repository }}"
        API_URL="${{ steps.configure-api.outputs.API_URL }}"
        AUTH_TOKEN="${{ steps.configure-api.outputs.API_TOKEN }}"
        SERVICE_ACCOUNT_NAME="${{ steps.configure-api.outputs.SERVICE_ACCOUNT_NAME }}"
        WORKSPACE_ROOT="${GITHUB_WORKSPACE:-$(git rev-parse --show-toplevel)}"
        export GOPROXY="${GOPROXY:-https://proxy.golang.org|direct}"
        PORT_FORWARD_PIDS=()
        BASE_IMAGE_FLAG=""
        if [ -n "${{ inputs.base_image }}" ]; then
          BASE_IMAGE_FLAG="-baseImage=${{ inputs.base_image }}"
        fi

        # Only disable TLS verification when TLS is enabled but no CA cert is provided
        if [[ "$TLS_ENABLED" == 'true' ]] && [ -z "$CA_CERT_PATH" ]; then
          DISABLE_TLS_CHECK='true'
        else
          DISABLE_TLS_CHECK='false'
        fi

        (
          cd "$WORKSPACE_ROOT"
          go mod download
        )

        cleanup_port_forwards() {
          for pid in "${PORT_FORWARD_PIDS[@]}"; do
            kill "$pid" 2>/dev/null || true
          done
        }

        start_port_forward_supervisor() {
          local name="$1"
          local namespace="$2"
          local resource="$3"
          local local_port="$4"
          local remote_port="$5"
          local log_file="/tmp/${name}-port-forward.log"

          (
            while true; do
              kubectl port-forward -n "$namespace" "$resource" "${local_port}:${remote_port}" >>"$log_file" 2>&1 || true
              echo "Port-forward for ${resource} on ${local_port}:${remote_port} exited; restarting in 2s" >>"$log_file"
              sleep 2
            done
          ) &
          PORT_FORWARD_PIDS+=("$!")
        }

        wait_for_local_port() {
          local port="$1"

          for i in $(seq 1 12); do
            if python3 -c 'import socket, sys; sock = socket.socket(); sock.settimeout(1); result = sock.connect_ex(("127.0.0.1", int(sys.argv[1]))); sock.close(); sys.exit(0 if result == 0 else 1)' "$port"
            then
              return 0
            fi
            echo "Waiting for localhost:${port} to accept connections... ($i/12)"
            sleep 5
          done

          return 1
        }

        if [ "${{ inputs.skip_api_config }}" != "true" ]; then
          trap cleanup_port_forwards EXIT

          start_port_forward_supervisor "seaweedfs" "${INPUT_DEFAULT_NAMESPACE}" "service/seaweedfs" "9000" "9000"
          wait_for_local_port 9000

          if [ -n "${MLFLOW_PORT_FORWARD_NS:-}" ] && [ -n "${MLFLOW_PORT_FORWARD_SVC:-}" ]; then
            if [ "${ARGO_COMPATIBILITY_TESTS:-}" = "true" ]; then
              echo "ERROR: MLflow and MLMD both require localhost:8080 in this action"
              exit 1
            fi
            REMOTE_PORT="${MLFLOW_PORT_FORWARD_REMOTE_PORT:-5000}"
            start_port_forward_supervisor "mlflow" "${MLFLOW_PORT_FORWARD_NS}" "svc/${MLFLOW_PORT_FORWARD_SVC}" "8080" "${REMOTE_PORT}"
            wait_for_local_port 8080
          fi

          if [ -z "${INPUT_API_URL}" ]; then
            API_SERVICE="${INPUT_DEPLOYMENT_NAME:-ml-pipeline}"
            start_port_forward_supervisor "api-server" "${INPUT_DEFAULT_NAMESPACE}" "service/${API_SERVICE}" "8888" "8888"

            for i in $(seq 1 12); do
              if curl -sf http://localhost:8888/apis/v1beta1/healthz > /dev/null 2>&1 || \
                 curl -skf https://localhost:8888/apis/v1beta1/healthz > /dev/null 2>&1; then
                echo "API server is reachable on localhost:8888"
                break
              fi
              if [ "$i" -eq 12 ]; then
                echo "ERROR: API server not reachable at localhost:8888"
                exit 1
              fi
              echo "Waiting for API server on localhost:8888... ($i/12)"
              sleep 5
            done
          fi

          if [ "${ARGO_COMPATIBILITY_TESTS:-}" = "true" ]; then
            start_port_forward_supervisor "mlmd" "${INPUT_DEFAULT_NAMESPACE}" "service/metadata-grpc-service" "8080" "8080"
            wait_for_local_port 8080
          fi
        fi

        go run github.com/onsi/ginkgo/v2/ginkgo -r -v --cover -p --keep-going --github-output=true --nodes=${{ inputs.num_parallel_nodes }} --label-filter=${{ inputs.test_label }} --silence-skips=true -- -namespace=${{ inputs.default_namespace }} -multiUserMode=$MULTI_USER -useProxy=$USE_PROXY -userNamespace=${{ inputs.user_namespace }} -uploadPipelinesWithKubernetes=${{ inputs.upload_pipelines_with_kubernetes_client}} -pipelineStoreKubernetes=$pipelineStoreKubernetes -disableTlsCheck=$DISABLE_TLS_CHECK -apiScheme=$API_SCHEME -tlsEnabled=$TLS_ENABLED -caCertPath=$CA_CERT_PATH -pullNumber=$PULL_NUMBER -repoName=$REPO_NAME -apiUrl="$API_URL" -authToken="$AUTH_TOKEN" -serviceAccountName="$SERVICE_ACCOUNT_NAME" -mlflowEnabled=${{ inputs.mlflow_enabled }} $BASE_IMAGE_FLAG
      continue-on-error: true

    - name: Collect Pod logs in case of Test Failures
      id: collect-logs
      shell: bash
      if: ${{ steps.run-tests.outcome != 'success' }}
      run: |
        echo "=== Current disk usage ==="
        df -h
        NAMESPACE="${{ inputs.default_namespace }}"
        ./.github/resources/scripts/collect-logs.sh --ns "$NAMESPACE" --output /tmp/tmp_pod_log.txt
        if [ "${{ inputs.proxy }}" = "true" ]; then
          ./.github/resources/scripts/collect-logs.sh --ns tinyproxy --output /tmp/tmp_pod_log.txt
        fi
        # Targeted SeaweedFS diagnostics: E2E lanes intermittently fail with
        # dial-timeout errors to the SeaweedFS ClusterIP. This captures the
        # restart/contention/dataplane evidence needed to tell whether a CPU
        # request bump (which this workflow's manifests carry) is the right
        # lever or the failure is elsewhere.
        ./.github/resources/scripts/collect-seaweedfs-diagnostics.sh --namespace "$NAMESPACE" --output /tmp/tmp_pod_log.txt
      continue-on-error: true

    - name: Summarize failure signatures
      # Encodes the recurring-flake triage playbook: greps the collected pod
      # logs and JUnit reports for known failure signatures (ClusterIP dial
      # timeouts per VIP, client deadline timeouts, 429 rate limits, OOMKills,
      # conntrack table-full, ...) and writes a compact classification table to
      # the job summary, so triage starts from a classified signal instead of
      # raw log archaeology.
      shell: bash
      if: ${{ steps.run-tests.outcome != 'success' }}
      run: ./.github/resources/scripts/failure-signature-summary.sh --log-file /tmp/tmp_pod_log.txt --reports-dir "${{ inputs.test_directory }}/reports"
      continue-on-error: true

    - name: Export Kind cluster logs
      id: kind-logs
      # `kind export logs` captures what the custom collectors cannot: kubelet
      # and containerd logs, kernel/dmesg, and per-node info from every node.
      shell: bash
      if: ${{ steps.run-tests.outcome != 'success' }}
      run: |
        rm -rf /tmp/kind-logs && mkdir -p /tmp/kind-logs
        exported=false
        if command -v kind >/dev/null 2>&1; then
          for cluster in $(kind get clusters 2>/dev/null); do
            # Steps run under bash -e; a failed export must not abort the step
            # before the artifact-name suffix below is written.
            if kind export logs --name "$cluster" "/tmp/kind-logs/$cluster"; then
              exported=true
            fi
          done
        fi
        echo "exported=$exported" >> "$GITHUB_OUTPUT"
        SUFFIX="${{ inputs.report_name }}"
        if [ -z "$SUFFIX" ]; then
          SUFFIX="${{ github.run_id }}_${{ github.job }}_$(uuidgen)"
        fi
        echo "suffix=$SUFFIX" >> "$GITHUB_OUTPUT"
      continue-on-error: true

    - name: Upload Kind cluster logs
      uses: actions/upload-artifact@v7
      if: ${{ steps.run-tests.outcome != 'success' && steps.kind-logs.outputs.exported == 'true' }}
      with:
        name: kind-logs - ${{ steps.kind-logs.outputs.suffix }}
        path: /tmp/kind-logs
        retention-days: 5
        if-no-files-found: ignore
      continue-on-error: true

    - name: Upload JUnit XML on failure
      # Raw per-test results from failed runs feed the scheduled CI health
      # report (per-test flake rates); the HTML report alone is not parseable.
      uses: actions/upload-artifact@v7
      if: ${{ steps.run-tests.outcome != 'success' }}
      with:
        name: junit-xml - ${{ steps.kind-logs.outputs.suffix || github.run_id }}
        path: ${{ inputs.test_directory }}/reports/*.xml
        retention-days: 30
        if-no-files-found: ignore
      continue-on-error: true

    - name: Set up Python for reporting
      uses: actions/setup-python@v6
      if: (!cancelled())
      with:
        python-version: ${{ inputs.report_python_version }}
        cache: 'pip'

    - name: Install Junit2Html plugin
      id: install-junit2html
      if: (!cancelled())
      shell: bash
      run: |
        pip install junit2html
      continue-on-error: true

    - name: Generate HTML report
      id: generate-html-report
      if: (!cancelled()) && steps.install-junit2html.outcome == 'success'
      shell: bash
      run: |
        junit2html ${{ inputs.test_directory }}/reports/junit.xml ${{ inputs.test_directory }}/reports/test-report.html
      continue-on-error: true

    - name: Configure report name
      id: name_gen
      shell: bash
      run: |
        REPORT_NAME="HTML Report - ${{ inputs.report_name }}"
        if [ -z ${{ inputs.report_name }} ]; then
          uuid=$(uuidgen)
          REPORT_NAME="HTML Report - ${{ github.run_id }}_${{ github.job }}_$uuid"
        fi
        echo "REPORT_NAME=$REPORT_NAME" >> "$GITHUB_OUTPUT"

    - name: Upload HTML Report
      id: upload
      uses: actions/upload-artifact@v7
      if: (!cancelled()) && steps.generate-html-report.outcome == 'success'
      with:
        name: ${{ steps.name_gen.outputs.REPORT_NAME }}
        path: ${{ inputs.test_directory }}/reports/test-report.html
        retention-days: 7
      continue-on-error: true

    - name: Publish Test Summary With HTML Report
      id: publish
      uses: ./.github/actions/junit-summary
      if: always() && !cancelled()
      with:
        xml_files: '${{ inputs.test_directory }}/reports'
        custom_data: '{\"HTML Report\": \"${{ steps.upload.outputs.artifact-url }}\"}'
      continue-on-error: true

    - name: Mark Workflow failure if test reporting failed
      if: always() && !cancelled() && (
        steps.install-junit2html.outcome == 'failure' ||
        steps.generate-html-report.outcome == 'failure' ||
        steps.upload.outcome != 'success' ||
        steps.publish.outcome == 'failure'
        )
      shell: bash
      run: exit 1

    - name: Mark Workflow failure if test step failed
      if: steps.run-tests.outcome != 'success' && !cancelled()
      shell: bash
      run: exit 1
