name: "Set up KFP on KinD"
description: "Step to start and configure KFP on KinD"

inputs:
  k8s_version:
    description: "The Kubernetes version to use for the Kind cluster"
    required: true
  kubernetes_store:
    description: "Flag to deploy KFP with K8s Native API"
    default: 'database'
    required: false

runs:
  using: "composite"
  steps:
    - name: Create k8s Kind Cluster
      uses: container-tools/kind-action@v2
      with:
        cluster_name: kfp
        kubectl_version: ${{ inputs.k8s_version }}
        version: v0.25.0
        node_image: kindest/node:${{ inputs.k8s_version }}

    - name: Build images
      shell: bash
      run: ./.github/resources/scripts/build-images.sh

    - name: Deploy KFP w/ Database
      shell: bash
      if: ${{ inputs.kubernetes_store == 'database'}}
      run: ./.github/resources/scripts/deploy-kfp.sh

    - name: Deploy KFP w/ K8s Native API
      shell: bash
      if: ${{ inputs.kubernetes_store == 'kubernetes' }}
      run: ./.github/resources/scripts/deploy-kfp.sh --deploy-k8s-native
