name: "Set up KFP on KinD"
description: "Step to start and configure KFP on Kind"

inputs:
  k8s_version:
    description: "The Kubernetes version to use for the Kind cluster"
    required: true
  cluster_name:
    description: "Provide kind cluster name if you want to name it other than kfp"
    required: false
    default: 'kfp'

runs:
  using: "composite"
  steps:
    - name: Free up disk space on runner
      uses: ./.github/actions/github-disk-cleanup

    - name: Restore Kind node image cache
      id: kind-node-cache
      uses: actions/cache@v5
      with:
        path: /tmp/kind-node-${{ inputs.k8s_version }}.tar
        key: kind-node-${{ runner.os }}-${{ inputs.k8s_version }}

    - name: Load Kind node image from cache
      if: ${{ steps.kind-node-cache.outputs.cache-hit == 'true' }}
      shell: bash
      run: docker load -i /tmp/kind-node-${{ inputs.k8s_version }}.tar

    - name: Pull and cache Kind node image
      if: ${{ steps.kind-node-cache.outputs.cache-hit != 'true' }}
      shell: bash
      run: |
        # Retry Docker Hub first, then fall back to the upstream Kind mirror on GCR.
        bash ./.github/resources/scripts/docker-pull-with-retry.sh \
          kindest/node:${{ inputs.k8s_version }} \
          gcr.io/k8s-staging-kind/node:${{ inputs.k8s_version }}
        docker save kindest/node:${{ inputs.k8s_version }} -o /tmp/kind-node-${{ inputs.k8s_version }}.tar

    - name: Create k8s Kind Cluster
      uses: helm/kind-action@v1.13.0
      id: cluster-create
      continue-on-error: true
      env:
        CURL_HOME: ${{ github.workspace }}/.github/resources/curl-retry
      with:
        cluster_name: ${{ inputs.cluster_name }}
        kubectl_version: ${{ inputs.k8s_version }}
        version: v0.32.0
        node_image: kindest/node:${{ inputs.k8s_version }}

    - name: Retry Create k8s Kind Cluster
      uses: helm/kind-action@v1.13.0
      if: ${{ steps.cluster-create.outcome == 'failure' }}
      env:
        CURL_HOME: ${{ github.workspace }}/.github/resources/curl-retry
      with:
        cluster_name: ${{ inputs.cluster_name }}
        kubectl_version: ${{ inputs.k8s_version }}
        version: v0.32.0
        node_image: kindest/node:${{ inputs.k8s_version }}

    - name: Remove kindnet CPU limit
      shell: bash
      run: |
        # kindnet is on the critical packet-forwarding path. Keep its 100m
        # scheduling request, but do not quota bursts that drain NFQUEUE.
        kubectl -n kube-system patch daemonset/kindnet --type=strategic \
          -p '{"spec":{"template":{"spec":{"containers":[{"name":"kindnet-cni","resources":{"requests":{"cpu":"100m"},"limits":{"cpu":null}}}]}}}}'
        kubectl -n kube-system rollout status daemonset/kindnet --timeout=180s

        cpu_request=$(kubectl -n kube-system get daemonset kindnet \
          -o jsonpath='{.spec.template.spec.containers[?(@.name=="kindnet-cni")].resources.requests.cpu}')
        cpu_limit=$(kubectl -n kube-system get daemonset kindnet \
          -o jsonpath='{.spec.template.spec.containers[?(@.name=="kindnet-cni")].resources.limits.cpu}')
        printf 'kindnet_cpu_request=%s\nkindnet_cpu_limit=%s\n' \
          "${cpu_request:-none}" "${cpu_limit:-none}"

        if [ "$cpu_request" != "100m" ] || [ -n "$cpu_limit" ]; then
          echo "Unexpected kindnet CPU resources after patch" >&2
          exit 1
        fi
