name: "Set up KFP on KinD"
description: "Step to start and configure KFP on Kind"

inputs:
  k8s_version:
    description: "The Kubernetes version to use for the Kind cluster"
    required: true
  cluster_name:
    description: "Provide kind cluster name if you want to name it other than kfp"
    required: false
    default: 'kfp'
  node_image:
    description: "Optional digest-pinned Kind node image for debugging"
    required: false
    default: ''
  kindnet_image:
    description: "Optional kindnetd image override for debugging"
    required: false
    default: ''

runs:
  using: "composite"
  steps:
    - name: Free up disk space on runner
      uses: ./.github/actions/github-disk-cleanup

    - name: Restore Kind node image cache
      if: ${{ inputs.node_image == '' }}
      id: kind-node-cache
      uses: actions/cache@v5
      with:
        path: /tmp/kind-node-${{ inputs.k8s_version }}.tar
        key: kind-node-${{ runner.os }}-${{ inputs.k8s_version }}

    - name: Load Kind node image from cache
      if: ${{ inputs.node_image == '' && steps.kind-node-cache.outputs.cache-hit == 'true' }}
      shell: bash
      run: docker load -i /tmp/kind-node-${{ inputs.k8s_version }}.tar

    - name: Pull and cache Kind node image
      if: ${{ inputs.node_image == '' && steps.kind-node-cache.outputs.cache-hit != 'true' }}
      shell: bash
      run: |
        # Retry Docker Hub first, then fall back to the upstream Kind mirror on GCR.
        bash ./.github/resources/scripts/docker-pull-with-retry.sh \
          kindest/node:${{ inputs.k8s_version }} \
          gcr.io/k8s-staging-kind/node:${{ inputs.k8s_version }}
        docker save kindest/node:${{ inputs.k8s_version }} -o /tmp/kind-node-${{ inputs.k8s_version }}.tar

    - name: Pull digest-pinned Kind node image
      if: ${{ inputs.node_image != '' }}
      shell: bash
      run: |
        bash ./.github/resources/scripts/docker-pull-with-retry.sh \
          "${{ inputs.node_image }}"

    - name: Create k8s Kind Cluster
      uses: helm/kind-action@v1.13.0
      id: cluster-create
      continue-on-error: true
      with:
        cluster_name: ${{ inputs.cluster_name }}
        kubectl_version: ${{ inputs.k8s_version }}
        version: v0.32.0
        node_image: ${{ inputs.node_image || format('kindest/node:{0}', inputs.k8s_version) }}

    - name: Retry Create k8s Kind Cluster
      uses: helm/kind-action@v1.13.0
      id: cluster-create-retry
      if: ${{ steps.cluster-create.outcome == 'failure' }}
      with:
        cluster_name: ${{ inputs.cluster_name }}
        kubectl_version: ${{ inputs.k8s_version }}
        version: v0.32.0
        node_image: ${{ inputs.node_image || format('kindest/node:{0}', inputs.k8s_version) }}

    - name: Override kindnetd for network-stack experiment
      if: ${{ inputs.kindnet_image != '' && (steps.cluster-create.outcome == 'success' || steps.cluster-create-retry.outcome == 'success') }}
      shell: bash
      run: |
        bash ./.github/resources/scripts/docker-pull-with-retry.sh \
          "${{ inputs.kindnet_image }}"
        kind load docker-image --name "${{ inputs.cluster_name }}" \
          "${{ inputs.kindnet_image }}"
        kubectl -n kube-system set image daemonset/kindnet \
          kindnet-cni="${{ inputs.kindnet_image }}"
        kubectl -n kube-system rollout status daemonset/kindnet --timeout=180s
        echo "requested_kindnet_image=${{ inputs.kindnet_image }}"
        kubectl -n kube-system get pods -l k8s-app=kindnet \
          -o custom-columns='NAME:.metadata.name,IMAGE:.spec.containers[0].image,IMAGE_ID:.status.containerStatuses[0].imageID'
