name: "Set up KFP on KinD"
description: "Step to start and configure KFP on Kind"

inputs:
  cluster_name:
    description: "Kind cluster name"
    default: 'kfp'
    required: false
  pipeline_store:
    description: "Flag to deploy KFP with K8s Native API"
    default: 'database'
    required: false
  proxy:
    description: "If KFP should be deployed with proxy configuration"
    required: false
    default: 'false'
  cache_enabled:
    description: "If KFP should be deployed with cache enabled globally"
    required: false
    default: 'true'
  image_tag:
    required: true
    description: "Provide the image tag your image was tagged with"
  image_path:
    required: true
    description: "Path within github artifacts where your image tarball is stored"
  image_registry:
    required: true
    description: "Image Registry address of the images"
  multi_user:
    description: "If KFP should be deployed in multi-user mode"
    required: false
    default: 'false'
  artifact_proxy:
    description: "Enables artifact proxy"
    required: false
    default: 'false'
  argo_version:
    required: false
    description: "Argo version to use for the cluster"
  db_type:
    description: "The type of database to deploy for testing (mysql or pgx)."
    required: false
    default: ""
  forward_port:
    required: false
    default: 'true'
    description: "If you want to forward API server port to localhost:8888"
  pod_to_pod_tls_enabled:
    description: "If KFP should be deployed with TLS pod-to-pod communication."
    required: false
    default: 'false'

runs:
  using: "composite"
  steps:
    - name: Deploy Squid
      id: deploy-squid
      if: ${{ inputs.proxy == 'true' }}
      shell: bash
      run: ./.github/resources/squid/deploy-squid.sh

    - name: Download Docker Images
      uses: actions/download-artifact@v7
      with:
        path: "images_${{ github.run_id }}"
        pattern: "!*.dockerbuild"

    - name: Load Control Plane Images Into Kind
      shell: bash
      run: |
        # These images are deployed directly by the CI manifests and use
        # IfNotPresent in the CI install path, so loading the image archive
        # into the Kind node is sufficient.
        APPS=("apiserver" "scheduledworkflow" "persistenceagent" "frontend" "metadata-writer" "viewer-crd-controller" "visualization-server" "cache-deployer" "cache-server" "metadata-envoy")
        for app in "${APPS[@]}"; do
          kind --name "${{ inputs.cluster_name }}" load image-archive "${{ inputs.image_path }}/$app/$app.tar"
          rm ${{ inputs.image_path }}/$app/$app.tar
        done

    - name: Load Driver and Launcher Images Into Kind
      shell: bash
      run: |
        # Runtime-generated workflow pods inherit these refs from the API server
        # environment. Tagging them away from `latest` makes Kubernetes default
        # them to IfNotPresent, so they can also be loaded directly into Kind.
        APPS=("driver" "launcher")
        for app in "${APPS[@]}"; do
          docker image load -i "${{ inputs.image_path }}/$app/$app.tar"
          docker tag "${{ inputs.image_registry }}/$app:${{ inputs.image_tag }}" "${{ inputs.image_registry }}/$app:ci"
          kind --name "${{ inputs.cluster_name }}" load docker-image "${{ inputs.image_registry }}/$app:ci"
          rm "${{ inputs.image_path }}/$app/$app.tar"
          docker image rm "${{ inputs.image_registry }}/$app:${{ inputs.image_tag }}"
          docker image rm "${{ inputs.image_registry }}/$app:ci"
        done

    - name: Load Runtime Base Images Into Kind
      shell: bash
      run: |
        docker pull python:3.11
        docker pull registry.access.redhat.com/ubi9/python-311:latest
        kind load docker-image python:3.11 --name ${{ inputs.cluster_name }}
        kind load docker-image registry.access.redhat.com/ubi9/python-311:latest --name ${{ inputs.cluster_name }}
        docker image rm python:3.11
        docker image rm registry.access.redhat.com/ubi9/python-311:latest

    - name: Configure Args
      shell: bash
      id: configure
      run: |
        ARGS=""

        if [ "${{ inputs.proxy }}" = "true" ]; then
          echo "Enabling Proxy"
          ARGS="${ARGS} --proxy"
        fi

        if [ "${{inputs.cache_enabled }}" = "false" ]; then
          echo "Disabling Cache"
          ARGS="${ARGS} --cache-disabled"
        fi

        if [ "${{inputs.pipeline_store }}" = "kubernetes" ]; then
          echo "Deploying in native K8s API Mode"
          ARGS="${ARGS} --deploy-k8s-native"
        fi

        if [ "${{ inputs.multi_user }}" = "true" ]; then
          echo "Deploying in Multi User Mode"
          ARGS="${ARGS} --multi-user"
        fi

        if [ "${{ inputs.artifact_proxy }}" = "true" ]; then
          echo "Enabling artifact proxy"
          ARGS="${ARGS} --artifact-proxy"
        fi

        if [ -n "${{ inputs.argo_version }}" ]; then
          echo "Deploying with argo version ${{ inputs.argo_version }}"
          ARGS="${ARGS} --argo-version ${{ inputs.argo_version }}"
        fi

        if [ "${{inputs.pod_to_pod_tls_enabled }}" = "true" ]; then
          ARGS="${ARGS} --tls-enabled"
        fi

        if [ -n "${{ inputs.db_type }}" ]; then
          echo "Deploying with database type ${{ inputs.db_type }}"
          ARGS="${ARGS} --db-type ${{ inputs.db_type }}"
        fi

        echo "ARGS=$ARGS" >> "$GITHUB_OUTPUT"

    - name: Deploy KFP
      id: deploy-kfp
      if: ${{ steps.configure.outcome == 'success' }}
      uses: nick-fields/retry@ce71cc2ab81d554ebbe88c79ab5975992d79ba08
      with:
        max_attempts: 2
        timeout_minutes: 15
        command: ./.github/resources/scripts/deploy-kfp.sh ${{ steps.configure.outputs.ARGS }}

    - name: Forward API port
      id: forward-api-port
      shell: bash
      if: ${{ steps.deploy-kfp.outcome == 'success' && inputs.forward_port == 'true'}}
      run: ./.github/resources/scripts/forward-port.sh "kubeflow" "ml-pipeline" 8888 8888
