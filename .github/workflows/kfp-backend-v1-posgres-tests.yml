name: KFP Backend V1 Postgres Tests

on:
  push:
    branches:
      - master
      - feature/replace-str-with-largetext-WIP # temporarily for Github Actions on for repo
  pull_request:
    paths:
      - "backend/**"
      - "manifests/kustomize/third-party/postgresql/**"
      - ".github/resources/manifests/standalone/**"
      - ".github/workflows/kfp-backend-v1-posgres-tests.yml"
      - "!**/*.md"
      - "!**/OWNERS"
env:
  NAMESPACE: kubeflow
  POSTGRES_NAMESPACE: kubeflow
  DB_TYPE: postgres
  DB_DRIVER: pgx
  DB_HOST: postgres.kubeflow.svc.cluster.local
  DB_PORT: "5432"
  DB_USER: user
  DB_PASSWORD: password
  DB_NAME: mlpipeline
jobs:
  build:
    uses: ./.github/workflows/image-builds-with-cache.yml
  postgres-pgx:
    name: Backend Postgres (pgx via Kustomize+KinD)
    runs-on: ubuntu-latest
    needs: build
    continue-on-error: false

    steps:
      - name: Checkout target code
        uses: actions/checkout@v5
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Create KFP cluster
        uses: ./.github/actions/create-cluster
        with:
          k8s_version: "v1.30.2"

      - name: Deploy KFP with Postgres
        uses: ./.github/actions/deploy
        with:
          db_type: "pgx"
          pipeline_store: "database"
          image_path: ${{ needs.build.outputs.IMAGE_PATH }}
          image_tag: ${{ needs.build.outputs.IMAGE_TAG }}
          image_registry: ${{ needs.build.outputs.IMAGE_REGISTRY }}
          forward_port: "false" # We will handle port-forwarding manually
      - name: Check DB connectivity from a temporary pod
        if: always()
        run: |
          echo "--- Checking database connectivity ---"
          # The service name is 'postgres-service' as defined in the kustomize config.
          echo "Attempting to connect to postgres-service:$DB_PORT..."
          kubectl run -n "$POSTGRES_NAMESPACE" --rm -i net-checker --image=busybox --restart=Never -- \
          sh -c "nc -z -v -w 10 postgres-service $DB_PORT"

      - name: Wait for API server readiness
        run: |
          echo "Waiting for KFP API server (ml-pipeline) to be Ready..."
          kubectl -n "$NAMESPACE" rollout status deploy/ml-pipeline --timeout=300s
          kubectl -n "$NAMESPACE" wait --for=condition=available deploy/ml-pipeline --timeout=60s
          echo "✅ KFP API server (ml-pipeline) is Ready"
          echo "=== ml-pipeline Logs (last 50 lines) ==="
          kubectl -n "$NAMESPACE" logs deploy/ml-pipeline --tail=200 || true

      - name: Port-forward Postgres
        run: |
          kubectl -n "$POSTGRES_NAMESPACE" port-forward svc/postgres-service 5432:5432 --address=127.0.0.3 &
          sleep 10
          echo "✅ Port-forwarding for Postgres is active."

      - name: Port-forward KFP API server
        run: |
          kubectl -n "$NAMESPACE" port-forward svc/ml-pipeline 8888:8888 &
          sleep 20
          echo "✅ Port-forwarding for ml-pipeline is active."

      - name: Run initialization tests
        run: |
          go test -v ./backend/test/initialization/... \
          -args -namespace="$NAMESPACE" \
          -runIntegrationTests=true

      - name: Run backend integration tests
        run: |
          go test -v ./backend/test/integration/... \
          -args -namespace="$NAMESPACE" \
          -runIntegrationTests=true \
          -runPostgreSQLTests=true

      - name: Debug ml-pipeline pod # for debugging
        if: failure()
        run: |
          echo "==== ml-pipeline api-server logs (previous) ===="
          kubectl -n kubeflow logs deploy/ml-pipeline -c ml-pipeline-api-server --previous || true

          echo "==== pipeline-install-config ConfigMap ===="
          kubectl -n kubeflow get configmap pipeline-install-config -o yaml || true

          echo "==== postgres-secret-extended Secret (keys only) ===="
          kubectl -n kubeflow get secret postgres-secret-extended -o jsonpath='{.data}' \
          | jq -r 'to_entries[] | "\(.key): <redacted>"' || true

      - name: Cleanup # before fi, logging for debugging
        if: always()
        run: |
          echo "==== Describe ml-pipeline Pod ===="
          ML_PIPELINE_POD=$(kubectl -n "$NAMESPACE" get pods -l app=ml-pipeline -o jsonpath='{.items[0].metadata.name}' || echo "ml-pipeline-pod-not-found")
          if [ "$ML_PIPELINE_POD" != "ml-pipeline-pod-not-found" ]; then
            kubectl -n "$NAMESPACE" describe pod "$ML_PIPELINE_POD" || true
            kubectl -n "$NAMESPACE" logs --previous "$ML_PIPELINE_POD" || true
          fi
          echo "==== KFP Pods ($NAMESPACE) ===="
          kubectl -n "$NAMESPACE" get pods -o wide || true
          echo "==== KFP Events ($NAMESPACE) ===="
          kubectl -n "$NAMESPACE" get events --sort-by=.lastTimestamp | tail -n 100 || true
          echo "==== Postgres Pods ($POSTGRES_NAMESPACE) ===="
          kubectl -n "$POSTGRES_NAMESPACE" get pods -o wide || true
          echo "==== Postgres Events ($POSTGRES_NAMESPACE) ===="
          kubectl -n "$POSTGRES_NAMESPACE" get events --sort-by=.lastTimestamp | tail -n 100 || true
