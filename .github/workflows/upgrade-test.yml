name: KFP upgrade tests

env:
  TESTS_DIR: "./backend/test/v2/api"
  TESTS_LABEL: "ApiServerTests"
  NUMBER_OF_PARALLEL_NODES: 15
  CLUSTER_NAME: "kfp"
  NAMESPACE: "kubeflow"
  PYTHON_VERSION: "3.9"

on:
  push:
    branches: [master]

  pull_request:
    paths:
      - '.github/workflows/upgrade-test.yml'
      - '.github/resources/**'
      - 'api/**'
      - 'go.mod'
      - 'go.sum'
      - 'backend/**'
      - 'proxy/**'
      - 'manifests/kustomize/**'
      - '!**/*.md'
      - '!**/OWNERS'

jobs:
  build:
    uses: ./.github/workflows/image-builds-with-cache.yml

  upgrade-test:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        k8s_version: [ "v1.31.0" ]
    name: KFP upgrade tests - K8s ${{ matrix.k8s_version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Free up disk space
        run: ./.github/resources/scripts/free-disk-space.sh

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.9

      - name: Get last release tag
        shell: bash
        id: get-tag
        run: |
          lastRelease=$(curl -sSL -H "Accept: application/vnd.github+json" "https://api.github.com/repos/kubeflow/pipelines/releases/latest" | jq -r .tag_name)
          echo "lastRelease=$lastRelease" >> $GITHUB_OUTPUT

      - name: Create cluster
        uses: ./.github/actions/create-cluster
        id: create-cluster
        with:
          k8s_version: ${{ matrix.k8s_version }}

      - name: Deploy Last Release
        shell: bash
        id: deploy-release
        run: |
          kubectl apply -k https://github.com/kubeflow/pipelines/manifests/kustomize/cluster-scoped-resources?ref=${{ steps.get-tag.outputs.lastRelease }}
          kubectl apply -k https://github.com/kubeflow/pipelines/manifests/kustomize/env/platform-agnostic?ref=${{ steps.get-tag.outputs.lastRelease }}
          source "./.github/resources/scripts/helper-functions.sh"
          wait_for_pods || EXIT_CODE=$?
          if [[ $EXIT_CODE -ne 0 ]]; then
            echo "Deploy unsuccessful. Not all pods running."
            exit 1
          fi

      - name: Forward API port
        id: forward-api-port
        if: ${{ steps.deploy-release.outcome == 'success' }}
        shell: bash
        run: ./.github/resources/scripts/forward-port.sh "kubeflow" "ml-pipeline" 8888 8888
        continue-on-error: true

      - name: Prepare for Upgrade
        id: prepare-upgrade
        if: ${{ steps.forward-api-port.outcome == 'success' }}
        working-directory: ${{ env.TESTS_DIR }}
        run: |
          go run github.com/onsi/ginkgo/v2/ginkgo -r -v --cover -p --keep-going --github-output=true --nodes=${{ env.NUMBER_OF_PARALLEL_NODES }} -v --label-filter="UpgradePreparation"
        continue-on-error: true

      - name: Deploy Master
        id: deploy-master
        if: ${{ steps.prepare-upgrade.outcome == 'success' }}
        shell: bash
        run: |
          kubectl apply -k https://github.com/kubeflow/pipelines/manifests/kustomize/cluster-scoped-resources?ref=master
          kubectl apply -k https://github.com/kubeflow/pipelines/manifests/kustomize/env/platform-agnostic?ref=master
          source "./.github/resources/scripts/helper-functions.sh"
          wait_for_pods || EXIT_CODE=$?
          if [[ $EXIT_CODE -ne 0 ]]; then
            echo "Deploy unsuccessful. Not all pods running."
            exit 1
          fi

      - name: Forward API port
        id: forward-api-port-after-upgrade
        if: ${{ steps.deploy-master.outcome == 'success' }}
        shell: bash
        run: ./.github/resources/scripts/forward-port.sh "kubeflow" "ml-pipeline" 8888 8888
        continue-on-error: true

      - name: Verify Upgrade
        working-directory: ${{ env.TESTS_DIR }}
        if: ${{ steps.deploy-master.outcome == 'success' }}
        id: verify-upgrade
        run: |
          go run github.com/onsi/ginkgo/v2/ginkgo -r -v --cover -p --keep-going --github-output=true --nodes=${{ env.NUMBER_OF_PARALLEL_NODES }} -v --label-filter="UpgradeVerification"
        continue-on-error: true

      - name: Collect Pod logs in case of Test Failures
        id: collect-logs
        if: ${{ steps.verify-upgrade.outcome != 'success' || steps.prepare-upgrade.outcome != 'success' }}
        run: ./.github/resources/scripts/collect-logs.sh --ns ${{ env.NAMESPACE }} --output /tmp/tmp_pod_log.txt

      - name: Publish Test Summary
        id: publish
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: (!cancelled()) && steps.collect-logs.outcome != 'failure'
        with:
          files: |
            ${{ env.TESTS_DIR }}/reports/*.xml

      - name: Install Junit2Html plugin and generate report
        if: (!cancelled()) && steps.collect-logs.outcome != 'failure'
        run: |
          pip install junit2html
          junit2html ${{ env.TESTS_DIR }}/reports/junit.xml ${{ env.TESTS_DIR }}/reports/test-report.html
        continue-on-error: true

      - name: Upload HTML Report
        id: upload
        uses: actions/upload-artifact@v4
        if: (!cancelled())
        with:
          name: HTML Report - Upgrade Tests
          path: ${{ env.TESTS_DIR }}/reports/test-report.html
          retention-days: 30
        continue-on-error: true

      - name: Mark Workflow failure if test step failed
        if: steps.compiler.outcome != 'success' && !cancelled()
        run: exit 1

      - name: Mark Workflow failure if test reporting failed
        if: (steps.publish.outcome == 'failure' || steps.upload.outcome != 'success') && !cancelled()
        run: exit 1
