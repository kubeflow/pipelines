name: API Server Tests
env:
  API_TESTS_DIR: "./backend/test/v2/api"
  TESTS_LABEL: "ApiServerTests"

on:
  push:
    branches: [master]

  workflow_dispatch:
    inputs:
      test_label:
        description: "Test label that you want to filter on and run"
        default: 'FullRegression'
        required: true
        type: string
      number_of_parallel_tests:
        description: "Number of ginkgo nodes that you want run in parallel, it essentially is equivalent to number of parallel tests with some caveats"
        default: 15
        required: true
        type: number

  pull_request:
    paths:
      - '.github/workflows/api-server-tests.yml'
      - '.github/resources/**'
      - 'backend/api/v2beta1/**'
      - 'backend/src/**'
      - 'backend/metadata_writer/**'
      - 'backend/test/v2/api/**'
      - 'manifests/kustomize/**'
      - '!**/*.md'
      - '!**/OWNERS'

jobs:
  api-test:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    strategy:
      matrix:
        k8s_version: [ "v1.31.0" ]
        pipeline_store: [ "database" ]
        cache_enabled: [ "true", "false" ]
        proxy: [ false, true ]
      fail-fast: false # So that failure in 1 type of parameterized job does not cause other jobs to terminate prematurely
    name: KFP API Server tests - K8s version ${{ matrix.k8s_version }} & pipeline store ${{ matrix.pipeline_store }} with cache enabled to '${{ matrix.cache_enabled }}' & proxy enabled to '${{ matrix.proxy }}'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.9

      - name: Create KFP cluster
        id: create-kfp-cluster
        uses: ./.github/actions/kfp-cluster
        with:
          k8s_version: ${{ matrix.k8s_version }}
          pipeline_store: ${{ matrix.pipeline_store }}
          cache_enabled: ${{ matrix.cache_enabled }}
          proxy: ${{ matrix.proxy }}
        continue-on-error: true

      - name: Forward API port
        id: forward-api-port
        if: ${{ steps.create-kfp-cluster.outcome == 'success' }}
        run: ./.github/resources/scripts/forward-port.sh "kubeflow" "ml-pipeline" 8888 8888
        continue-on-error: true

      - name: API Server API Tests - Auto Trigger
        id: api-tests
        if: ${{ steps.forward-api-port.outcome == 'success' && github.event.inputs.test_label == ''}}
        working-directory: ${{ env.API_TESTS_DIR }}
        run: go run github.com/onsi/ginkgo/v2/ginkgo -r -v --cover -p --keep-going --nodes=15 -v --label-filter=${{ env.TESTS_LABEL }} -- -namespace=kubeflow -useProxy=${{ matrix.proxy }} -cacheEnabled=${{ matrix.cache_enabled }}
        continue-on-error: true

      - name: Collect Pod logs in case KFP cluster failed to start correctly
        if: ${{ steps.create-kfp-cluster.outcome != 'success' }}
        run: |
          ./.github/resources/scripts/collect-logs.sh --ns kubeflow --output /tmp/tmp_pod_log.txt
          exit 1

      - name: API Server API Tests - Manual Trigger
        id: api-tests-manual
        if: ${{ steps.forward-api-port.outcome == 'success' && github.event.inputs.test_label }}
        working-directory: ${{ env.API_TESTS_DIR }}
        run: go run github.com/onsi/ginkgo/v2/ginkgo -r -v --cover -p --keep-going --nodes=${{ inputs.number_of_parallel_tests }} -v --label-filter=${{ inputs.test_label }} -- -namespace=kubeflow -useProxy=${{ matrix.proxy }} -cacheEnabled=${{ matrix.cache_enabled }}
        env:
          PIPELINE_STORE: ${{ matrix.pipeline_store }}
        continue-on-error: true

      - name: Collect Pod logs in case of Test Failures
        if: ${{ steps.api-tests-manual.outcome != 'success' }}
        run: |
          ./.github/resources/scripts/collect-logs.sh --ns kubeflow --output /tmp/tmp_pod_log.txt

      - name: Publish Test Summary
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: (!cancelled())
        with:
          files: |
            ${{ env.API_TESTS_DIR }}/reports/*.xml

      - name: Install Junit2Html plugin and generate report
        run: |
          go run github.com/alexec/junit2html@latest < ${{ env.API_TESTS_DIR }}/reports/junit.xml > ${{ env.API_TESTS_DIR }}/reports/test-report.html

      - name: Generate UUID
        id: uuid_gen
        run: echo "uuid=$(uuidgen)" >> $GITHUB_OUTPUT

      - name: Upload HTML Report
        id: upload
        uses: actions/upload-artifact@v4
        if: (!cancelled())
        with:
          name: HTML Report - ${{ github.run_id }}_${{ steps.uuid_gen.outputs.uuid }}
          path: ${{ env.API_TESTS_DIR }}/reports/test-report.html
        continue-on-error: true

      - name: Mark Workflow failure if test step failed
        if: ${{ steps.api-tests.outcome != 'success' || steps.api-tests-manual.outcome == 'failure' || steps.upload.outcome != 'success' }}
        run: exit 1

