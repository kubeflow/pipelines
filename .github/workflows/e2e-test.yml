name: KFP E2E Pipeline tests
env:
  E2E_TESTS_DIR: "./backend/test/end2end"
  NUMBER_OF_PARALLEL_NODES: 10
  CLUSTER_NAME: "kfp"
  NAMESPACE: "kubeflow"
  PYTHON_VERSION: "3.9"
  USER_NAMESPACE: "kubeflow-user-example-com"
  CA_CERT_PATH: ""
  AWS_ACCESS_KEY_ID: 'minio'
  AWS_SECRET_ACCESS_KEY: 'minio123'
  AWS_S3_BUCKET: 'mlpipeline'
  MLFLOW_TRACKING_URI: "https://localhost:8080/mlflow"
  MLFLOW_TRACKING_INSECURE_TLS: "true"

on:
  push:
    branches: [master]

  pull_request:
    paths:
      - '.github/workflows/e2e-test.yml'
      - '.github/workflows/image-builds.yml'
      - '.github/actions/create-cluster/**'
      - '.github/actions/deploy/**'
      - '.github/actions/test-and-report/**'
      - '.github/resources/**'
      - 'api/**'
      - 'go.mod'
      - 'go.sum'
      - 'backend/**'
      - 'proxy/**'
      - 'manifests/kustomize/**'
      # The artifact-proxy E2E script is exercised only by this workflow, so
      # changes to it must trigger these lanes.
      - 'test/artifact-proxy/**'
      - 'test_data/sdk_compiled_pipelines/**'
      - '!**/*.md'
      - '!**/OWNERS'


  workflow_dispatch:
    inputs:
      test_label:
        description: "Test label that you want to filter on and run"
        default: 'ApiServerTests'
        required: true
        type: string
      number_of_parallel_tests:
        description: "Number of ginkgo nodes that you want run in parallel, it essentially is equivalent to number of parallel tests with some caveats"
        default: 10
        required: true
        type: number
      namespace:
        description: "Namespace where you want to create your pipelines in"
        default: "kubeflow"
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    uses: ./.github/workflows/image-builds.yml

  end-to-end-scenario-tests:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    strategy:
      matrix:
        k8s_version: ["v1.36.1"]
        cache_enabled: ["true", "false"]
        argo_version: [ "v3.7.14", "v4.0.5" ]
        proxy: [ "false" ]
        # Automatic runs split the dominant Critical suite across two Kind
        # runners. Manual dispatch retains the historical unsharded labels.
        test_label: ${{ fromJSON(github.event_name == 'workflow_dispatch' && '["E2ECritical", "E2EEssential", "E2EParallelNested"]' || '["E2ECriticalShardA", "E2ECriticalShardB", "E2EEssential", "E2EParallelNested"]') }}
        pod_to_pod_tls_enabled: [ "false" ]
        include:
          - k8s_version: "v1.33.12"
            cache_enabled: "false"
            argo_version: "v3.7.14"
            test_label: "E2ECritical"
          - k8s_version: "v1.36.1"
            cache_enabled: "false"
            proxy: "true"
            test_label: "E2EProxy"
          - k8s_version: "v1.36.1"
            cache_enabled: "false"
            test_label: "E2EFailure"
          - k8s_version: "v1.36.1"
            cache_enabled: "true"
            pod_to_pod_tls_enabled: "true"
            test_label: "E2ECritical"
          # PostgreSQL lane — cache_enabled=true only (no pgx overlay for
          # cache-disabled, proxy, or TLS).
          # TODO: expand when additional standalone/postgresql/* overlays exist.
          - k8s_version: "v1.36.1"
            cache_enabled: "true"
            argo_version: "v4.0.5"
            proxy: "false"
            pod_to_pod_tls_enabled: "false"
            db_type: "pgx"
            test_label: "E2ECritical"
      fail-fast: false
    name: End to End ${{ matrix.test_label}} Tests - K8s ${{ matrix.k8s_version }} cacheEnabled=${{ matrix.cache_enabled }} argoVersion=${{ matrix.argo_version}} proxy=${{ matrix.proxy}} pod_to_pod_tls_enabled=${{ matrix.pod_to_pod_tls_enabled }} dbType=${{ matrix.db_type }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Create cluster
        uses: ./.github/actions/create-cluster
        id: create-cluster
        with:
          k8s_version: ${{ matrix.k8s_version }}
          cluster_name: ${{ env.CLUSTER_NAME }}

      - name: Deploy KFP
        uses: ./.github/actions/deploy
        if: ${{ steps.create-cluster.outcome == 'success' }}
        id: deploy
        with:
          proxy: ${{ matrix.proxy }}
          cache_enabled: ${{ matrix.cache_enabled }}
          argo_version: ${{ matrix.argo_version }}
          pod_to_pod_tls_enabled: ${{ matrix.pod_to_pod_tls_enabled }}
          db_type: ${{ matrix.db_type }}
          image_path: images_${{ github.run_id }}
          image_tag: latest
          image_registry: kind-registry:5000

      - name: Configure Cluster CA Cert for TLS-Enabled Tests
        shell: bash
        if: ${{ matrix.pod_to_pod_tls_enabled == 'true'}}
        run: |
          kubectl get secret kfp-api-tls-cert -n kubeflow -o jsonpath='{.data.ca\.crt}' | base64 -d > "${{ github.workspace }}/ca.crt"
          echo "CA_CERT_PATH=${{ github.workspace }}/ca.crt" >> "$GITHUB_ENV"
      - name: Configure Input Variables
        shell: bash
        id: configure
        if: ${{ steps.deploy.outcome == 'success' }}
        env:
          DISPATCH_NUMBER_OF_NODES: ${{ inputs.number_of_parallel_tests }}
          DISPATCH_TEST_LABEL: ${{ inputs.test_label }}
          DISPATCH_NAMESPACE: ${{ inputs.namespace }}
        run: |
          NUMBER_OF_NODES=${{ env.NUMBER_OF_PARALLEL_NODES }}
          TEST_LABEL=${{ matrix.test_label }}
          NAMESPACE=${{ env.NAMESPACE }}

          if [ "$TEST_LABEL" == "E2EFailure" ]; then
            NUMBER_OF_NODES=2
          elif [ "$TEST_LABEL" == "E2ECriticalShardA" ] || [ "$TEST_LABEL" == "E2ECriticalShardB" ]; then
            NUMBER_OF_NODES=10
            TEST_LABEL="E2ECritical && $TEST_LABEL"
          elif [ "$TEST_LABEL" == "E2ECritical" ] || [ "$TEST_LABEL" == "E2EEssential" ]; then
            NUMBER_OF_NODES=10
          elif [ "$TEST_LABEL" == "E2EParallelNested" ]; then
            # Each spec fans out into nested child pipelines, so retain its
            # historical lower cap instead of using the global default.
            NUMBER_OF_NODES=3
          fi

          # Explicit dispatch inputs take precedence over automatic lane caps.
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            NUMBER_OF_NODES=$DISPATCH_NUMBER_OF_NODES
            TEST_LABEL=$DISPATCH_TEST_LABEL
            NAMESPACE=$DISPATCH_NAMESPACE
          fi

          {
            echo "NUMBER_OF_NODES=$NUMBER_OF_NODES"
            echo "TEST_LABEL=$TEST_LABEL"
            echo "NAMESPACE=$NAMESPACE"
          } >> "$GITHUB_OUTPUT"

      - name: Build and upload the sample Modelcar image to Kind
        id: build-sample-modelcar-image
        if: ${{ steps.deploy.outcome == 'success' }}
        run: |
          source ./.github/resources/scripts/helper-functions.sh
          retry 3 20 env DOCKER_BUILDKIT=1 docker build \
            --file ./test_data/sdk_compiled_pipelines/valid/critical/modelcar/Dockerfile \
            --tag registry.domain.local/modelcar:test \
            .
          kind --name kfp load docker-image registry.domain.local/modelcar:test

      - name: Run Tests
        uses: ./.github/actions/test-and-report
        id: test-run
        if: ${{ steps.configure.outcome == 'success' }}
        with:
          proxy: ${{ matrix.proxy }}
          cache_enabled: ${{ matrix.cache_enabled }}
          test_directory: ${{ env.E2E_TESTS_DIR }}
          test_label: ${{ steps.configure.outputs.TEST_LABEL }}
          num_parallel_nodes: ${{ steps.configure.outputs.NUMBER_OF_NODES }}
          default_namespace: ${{ steps.configure.outputs.NAMESPACE }}
          python_version: ${{ env.PYTHON_VERSION }}
          report_name: "${{ matrix.test_label}}Tests_K8s=${{ matrix.k8s_version }}_cacheEnabled=${{ matrix.cache_enabled }}_argoVersion=${{ matrix.argo_version}}_proxy=${{ matrix.proxy }}"
          tls_enabled: ${{ matrix.pod_to_pod_tls_enabled }}
          ca_cert_path: ${{ env.CA_CERT_PATH }}

  end-to-end-critical-scenario-multi-user-tests:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    strategy:
      matrix:
        k8s_version: ["v1.36.1"]
        cache_enabled: ["true", "false"]
        multi_user: [ "true" ]
        test_label: ${{ fromJSON(github.event_name == 'workflow_dispatch' && '["E2ECritical"]' || '["E2ECriticalShardA", "E2ECriticalShardB"]') }}
        include:
          # PostgreSQL lane — cache_enabled=true, artifact_proxy disabled
          # (no pgx overlay for cache-disabled or artifact-proxy).
          # TODO: expand when multiuser/postgresql/cache-disabled and
          # multiuser/postgresql/artifact-proxy overlays exist.
          - k8s_version: "v1.36.1"
            cache_enabled: "true"
            multi_user: "true"
            db_type: "pgx"
            artifact_proxy: "false"
            test_label: "E2ECritical"
      fail-fast: false
    name: End to End Critical Scenario Multi User ${{ matrix.test_label }} Tests - K8s ${{ matrix.k8s_version }} cacheEnabled=${{ matrix.cache_enabled }} multiUser=${{ matrix.multi_user }} artifactProxy=${{ matrix.artifact_proxy || matrix.cache_enabled }} dbType=${{ matrix.db_type }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Create cluster
        uses: ./.github/actions/create-cluster
        id: create-cluster
        with:
          k8s_version: ${{ matrix.k8s_version }}
          cluster_name: ${{ env.CLUSTER_NAME }}

      - name: Deploy KFP
        uses: ./.github/actions/deploy
        if: ${{ steps.create-cluster.outcome == 'success' }}
        id: deploy
        with:
          cache_enabled: ${{ matrix.cache_enabled }}
          multi_user: "true"
          # The cache-enabled multi-user variant is the artifact-proxy
          # compatibility lane; both automatic Critical shards exercise it.
          # pgx include sets artifact_proxy explicitly to "false" because no
          # multiuser/postgresql/artifact-proxy overlay exists yet.
          artifact_proxy: ${{ matrix.artifact_proxy || matrix.cache_enabled }}
          db_type: ${{ matrix.db_type }}
          image_path: images_${{ github.run_id }}
          image_tag: latest
          image_registry: kind-registry:5000

      - name: Configure Input Variables
        shell: bash
        id: configure
        if: ${{ steps.deploy.outcome == 'success' }}
        env:
          DISPATCH_NUMBER_OF_NODES: ${{ inputs.number_of_parallel_tests }}
          DISPATCH_TEST_LABEL: ${{ inputs.test_label }}
          DISPATCH_NAMESPACE: ${{ inputs.namespace }}
        run: |
          NUMBER_OF_NODES=10
          TEST_LABEL=${{ matrix.test_label }}
          NAMESPACE=${{ env.NAMESPACE }}
          if [ "$TEST_LABEL" == "E2ECriticalShardA" ] || [ "$TEST_LABEL" == "E2ECriticalShardB" ]; then
            TEST_LABEL="E2ECritical && $TEST_LABEL"
          fi
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            NUMBER_OF_NODES=$DISPATCH_NUMBER_OF_NODES
            TEST_LABEL=$DISPATCH_TEST_LABEL
            NAMESPACE=$DISPATCH_NAMESPACE
          fi
          {
            echo "NUMBER_OF_NODES=$NUMBER_OF_NODES"
            echo "TEST_LABEL=$TEST_LABEL"
            echo "NAMESPACE=$NAMESPACE"
          } >> "$GITHUB_OUTPUT"

      - name: Build and upload the sample Modelcar image to Kind
        id: build-sample-modelcar-image
        if: ${{ steps.deploy.outcome == 'success' }}
        run: |
          source ./.github/resources/scripts/helper-functions.sh
          retry 3 20 env DOCKER_BUILDKIT=1 docker build \
            --file ./test_data/sdk_compiled_pipelines/valid/critical/modelcar/Dockerfile \
            --tag registry.domain.local/modelcar:test \
            .
          kind --name kfp load docker-image registry.domain.local/modelcar:test

      - name: Test Artifact Proxy
        id: test-artifact-proxy
        if: ${{ steps.deploy.outcome == 'success' && (matrix.artifact_proxy || matrix.cache_enabled) == 'true' }}
        shell: bash
        env:
          USER_NAMESPACE: ${{ env.USER_NAMESPACE }}
        run: |
          ./test/artifact-proxy/test-artifact-proxy.sh "$USER_NAMESPACE"

      - name: Test namespace isolation (SeaweedFS multi-tenancy)
        id: test-namespace-isolation
        if: ${{ steps.deploy.outcome == 'success' }}
        shell: bash
        run: |
          bash test/seaweedfs/namespace_isolation_test.sh

      - name: Run Tests
        uses: ./.github/actions/test-and-report
        if: ${{ steps.configure.outcome == 'success' }}
        id: test-run
        env:
          LOCAL_API_SERVER: "true"
          MULTI_USER: ${{ matrix.multi_user }}
        with:
          multi_user: ${{ matrix.multi_user }}
          cache_enabled: ${{ matrix.cache_enabled }}
          test_directory: ${{ env.E2E_TESTS_DIR }}
          test_label: ${{ steps.configure.outputs.TEST_LABEL }}
          num_parallel_nodes: ${{ steps.configure.outputs.NUMBER_OF_NODES }}
          default_namespace: ${{ steps.configure.outputs.NAMESPACE }}
          python_version: ${{ env.PYTHON_VERSION }}
          user_namespace: ${{ env.USER_NAMESPACE }}
          report_name: "E2EMultiUser${{ matrix.test_label }}Tests_K8s=${{ matrix.k8s_version }}_cacheEnabled=${{ matrix.cache_enabled }}_multiUser=${{ matrix.multi_user }}"


  end-to-end-critical-mlflow-tests:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    strategy:
      matrix:
        k8s_version: [ "v1.36.1" ]
        cache_enabled: [ "true", "false" ]
        argo_version: [ "v3.7.3" ]
        proxy: [ "false" ]
        test_label: [ "MLflow" ]
        pod_to_pod_tls_enabled: [ "false" ]
        multi_user: [ "false" ]
        artifact_proxy: [ "false" ]
        artifact_storage: [ "file", "s3" ]
        backend_store: [ "postgres" ]
        registry_store: [ "postgres" ]
        mlflow_auth_type: [ "kubernetes", "basic-auth", "none" ]
        exclude:
          - artifact_storage: "s3"
            mlflow_auth_type: "basic-auth"
          - artifact_storage: "s3"
            mlflow_auth_type: "none"
        include:
          # PostgreSQL lane for KFP database — cache_enabled=true only.
          - k8s_version: "v1.36.1"
            cache_enabled: "true"
            argo_version: "v3.7.3"
            proxy: "false"
            test_label: "MLflow"
            pod_to_pod_tls_enabled: "false"
            multi_user: "false"
            artifact_proxy: "false"
            artifact_storage: "file"
            backend_store: "postgres"
            registry_store: "postgres"
            mlflow_auth_type: "kubernetes"
            db_type: "pgx"
      fail-fast: false
    name: End to End Critical Scenario MLflow Tests - K8s ${{ matrix.k8s_version }} cacheEnabled=${{ matrix.cache_enabled }} artifactStorage=${{ matrix.artifact_storage }} authType=${{ matrix.mlflow_auth_type }} dbType=${{ matrix.db_type }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Create cluster
        uses: ./.github/actions/create-cluster
        id: create-cluster
        with:
          k8s_version: ${{ matrix.k8s_version }}
          cluster_name: ${{ env.CLUSTER_NAME }}

      - name: Deploy KFP
        uses: ./.github/actions/deploy
        if: ${{ steps.create-cluster.outcome == 'success' }}
        id: deploy
        with:
          cache_enabled: ${{ matrix.cache_enabled }}
          argo_version: ${{ matrix.argo_version }}
          pod_to_pod_tls_enabled: ${{ matrix.pod_to_pod_tls_enabled }}
          multi_user: ${{ matrix.multi_user }}
          artifact_proxy: ${{ matrix.artifact_proxy }}
          db_type: ${{ matrix.db_type }}
          image_path: images_${{ github.run_id }}
          image_tag: latest
          image_registry: kind-registry:5000

      - name: Deploy MLflow with Kubernetes auth
        id: deploy-mlflow
        uses: opendatahub-io/mlflow-operator/.github/actions/deploy@b55bcb6aa528ccecf8904745bb0218350b1ff453
        if: ${{ steps.create-cluster.outcome == 'success' && matrix.mlflow_auth_type == 'kubernetes' }}
        with:
          namespace: 'opendatahub'
          mlflow_image: quay.io/${{ github.repository_owner == 'red-hat-data-services' && 'rhoai' || 'opendatahub' }}/mlflow:odh-stable
          mlflow_operator_image: quay.io/${{ github.repository_owner == 'red-hat-data-services' && 'rhoai' || 'opendatahub' }}/mlflow-operator:odh-stable
          backend_store: ${{ matrix.backend_store }}
          artifact_storage: ${{ matrix.artifact_storage }}
          registry_store: ${{ matrix.registry_store }}
          s3_access_key: ${{ env.AWS_ACCESS_KEY_ID }}
          s3_secret_key: ${{ env.AWS_SECRET_ACCESS_KEY }}

      - name: Deploy MLflow directly
        id: deploy_direct_mlflow
        shell: bash
        if: ${{ steps.create-cluster.outcome == 'success' && matrix.mlflow_auth_type != 'kubernetes' }}
        env:
          # The direct optional-auth lane uses upstream MLflow. The kubernetes-auth
          # lane above still uses the ODH operator because upstream MLflow does not
          # provide the ODH kubernetes-auth app.
          MLFLOW_IMAGE: ghcr.io/mlflow/mlflow:v3.13.0-full
        run: ./.github/resources/scripts/deploy-direct-mlflow.sh opendatahub "${{ matrix.mlflow_auth_type }}" "${{ matrix.artifact_storage }}" "$MLFLOW_IMAGE"

      - name: Increase Kubernetes-auth MLflow workers
        shell: bash
        if: ${{ steps.deploy-mlflow.outcome == 'success' && matrix.artifact_storage == 'file' }}
        run: |
          # The operator deploy action does not expose spec.workers yet. Its
          # default of one Uvicorn worker lets file-artifact requests block the
          # health endpoint and all MLflow API traffic behind a single request.
          kubectl patch mlflow mlflow -n opendatahub --type=merge \
            -p '{"spec":{"workers":2}}'
          kubectl rollout status deployment/mlflow -n opendatahub --timeout=300s

      - name: Wait for MLflow stack readiness
        shell: bash
        if: ${{ steps.deploy-mlflow.outcome == 'success' || steps.deploy_direct_mlflow.outcome == 'success' }}
        run: |
          kubectl wait --for=condition=Ready pods --field-selector=status.phase=Running -n opendatahub --timeout=180s
          echo "All running pods in opendatahub are Ready"

      - name: Configure MLflow Plugin and Forward Ports
        shell: bash
        id: configure-mlflow-plugin
        if: ${{ steps.deploy.outcome == 'success' && (steps.deploy-mlflow.outcome == 'success' || steps.deploy_direct_mlflow.outcome == 'success') }}
        run: ./.github/resources/scripts/configure-mlflow.sh kubeflow opendatahub backend/src/apiserver/config/config.json "${{ matrix.mlflow_auth_type }}"

      - name: Configure Input Variables
        shell: bash
        id: configure
        if: ${{ steps.deploy.outcome == 'success' }}
        env:
          DISPATCH_NUMBER_OF_NODES: ${{ inputs.number_of_parallel_tests }}
          DISPATCH_TEST_LABEL: ${{ inputs.test_label }}
          DISPATCH_NAMESPACE: ${{ inputs.namespace }}
        run: |
          # Keep a measured step below the historical ten-node setting while
          # validating the uncapped kindnet dataplane under additional load.
          NUMBER_OF_NODES=2
          TEST_LABEL=${{ matrix.test_label }}
          NAMESPACE=${{ env.NAMESPACE }}
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            NUMBER_OF_NODES=$DISPATCH_NUMBER_OF_NODES
            TEST_LABEL=$DISPATCH_TEST_LABEL
            NAMESPACE=$DISPATCH_NAMESPACE
          fi

          {
            echo "NUMBER_OF_NODES=$NUMBER_OF_NODES"
            echo "TEST_LABEL=$TEST_LABEL"
            echo "NAMESPACE=$NAMESPACE"
          } >> "$GITHUB_OUTPUT"

      - name: Build and upload the sample Modelcar image to Kind
        id: build-sample-modelcar-image
        if: ${{ steps.deploy.outcome == 'success' }}
        run: |
          source ./.github/resources/scripts/helper-functions.sh
          retry 3 20 env DOCKER_BUILDKIT=1 docker build \
            --file ./test_data/sdk_compiled_pipelines/valid/critical/modelcar/Dockerfile \
            --tag registry.domain.local/modelcar:test \
            .
          kind --name kfp load docker-image registry.domain.local/modelcar:test

      - name: Run Tests
        uses: ./.github/actions/test-and-report
        id: test-run
        if: ${{ steps.configure.outcome == 'success' && (steps.deploy-mlflow.outcome == 'success' || steps.deploy_direct_mlflow.outcome == 'success') && steps.configure-mlflow-plugin.outcome == 'success'}}
        with:
          cache_enabled: ${{ matrix.cache_enabled }}
          test_directory: ${{ env.E2E_TESTS_DIR }}
          test_label: ${{ steps.configure.outputs.TEST_LABEL }}
          num_parallel_nodes: ${{ steps.configure.outputs.NUMBER_OF_NODES }}
          default_namespace: ${{ steps.configure.outputs.NAMESPACE }}
          python_version: ${{ env.PYTHON_VERSION }}
          report_name: "MLflowTests_K8s=${{ matrix.k8s_version }}_cacheEnabled=${{ matrix.cache_enabled }}_artifactStorage=${{ matrix.artifact_storage }}_authType=${{ matrix.mlflow_auth_type }}"
          tls_enabled: ${{ matrix.pod_to_pod_tls_enabled }}
          ca_cert_path: ${{ env.CA_CERT_PATH }}
          mlflow_enabled: 'true'
