# Presubmit gate for the Python tooling and CI action wiring under .github:
# the unit tests are stdlib-only and use the `*_test.py` suffix, so select
# that pattern explicitly because it is not unittest discover's default.
name: CI Scripts Tests

on:
  pull_request:
    paths:
      - '.github/actions/create-cluster/**'
      - '.github/actions/deploy/**'
      - '.github/actions/download-artifact-with-retry/**'
      - '.github/resources/curl-retry/**'
      - '.github/resources/runtime-base-images.txt'
      - '.github/resources/scripts/*.py'
      # The observability shell scripts are covered by Python-driven tests.
      - '.github/resources/scripts/*.sh'
      - '.github/resources/scripts/kfp-readiness/**'
      - '.github/workflows/ci-checks.yml'
      - '.github/actions/upload-artifact-with-retry/**'
      - '.github/actions/test-and-report/**'
      - '.github/workflows/create-manifest.yml'
      - '.github/workflows/e2e-test.yml'
      - '.github/workflows/image-builds.yml'
      - '.github/workflows/ci-scripts-tests.yml'
      - '.github/workflows/gh-workflow-approve.yml'

permissions:
  contents: read

jobs:
  python-script-tests:
    name: Run .github scripts unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Run Python script unit tests
        working-directory: .github/resources/scripts
        run: python3 -m unittest discover -v -p '*_test.py'
