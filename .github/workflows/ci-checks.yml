# This workflow checks if all CI checks have passed by polling every 5 minutes for a total of 8 attempts.
name: CI Check

on:
  pull_request_target:
    types: [opened, synchronize, reopened, labeled]

jobs:
  check_ci_status:
    runs-on: ubuntu-latest
    permissions:
      checks: read
    steps:
      - name: Check out the repository
        uses: actions/checkout@v5

      - name: Check for 'needs-ok-to-test' and 'ok-to-test' labels
        id: label_check
        run: |
          needs_ok="${{ contains(github.event.pull_request.labels.*.name, 'needs-ok-to-test') }}"
          # needs-ok-to-test present (with or without ok-to-test) -> fail
          if [[ "$needs_ok" == "true" ]]; then
            echo "Label 'needs-ok-to-test' is set. Workflow must fail."
            exit 1
          fi
          # no labels or ok-to-test -> run polling; job passes if all checks pass
          echo "run_checks=true" >> "$GITHUB_OUTPUT"

      - name: Check if all CI checks passed
        if: steps.label_check.outputs.run_checks == 'true'
        uses: wechuli/allcheckspassed@0b68b3b7d92e595bcbdea0c860d05605720cf479
        with:                                 
          delay: '5'
          retries: '10'
          polling_interval: '5'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Save PR payload
        if: steps.label_check.outputs.run_checks == 'true'
        shell: bash
        run: |
          mkdir -p ./pr
          echo ${{ github.event.pull_request.number }} >> ./pr/pr_number          
          echo ${{ github.event.action }} >> ./pr/event_action
      - uses: actions/upload-artifact@v4
        if: steps.label_check.outputs.run_checks == 'true'
        with:
          name: pr
          path: pr/
