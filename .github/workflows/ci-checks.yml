# This workflow checks if all CI checks have passed by polling every 5 minutes.
#
# It triggers on all pull_request_target events that could affect CI status or
# label eligibility. For unrelated label changes (lgtm, approved, size/*, etc.)
# the workflow still runs but exits immediately with a 'success' conclusion,
# so it doesn't clobber the previous green status that tide depends on.
name: CI Check

on:
  pull_request_target:
    types: [opened, synchronize, reopened, labeled, unlabeled]

jobs:
  check_ci_status:
    runs-on: ubuntu-latest
    permissions:
      checks: read
    steps:
      - name: Check eligibility
        id: eligible
        run: |
          # For labeled events, only the 'ok-to-test' label can change eligibility.
          # For unlabeled events, only 'needs-ok-to-test' removal matters.
          # All other label changes are irrelevant — exit early with success
          # to avoid restarting the 50-min polling loop and to prevent a
          # 'skipped' conclusion from blocking tide.
          action="${{ github.event.action }}"
          label_name="${{ github.event.label.name }}"

          if [[ "$action" == "labeled" && "$label_name" != "ok-to-test" ]]; then
            echo "Ignoring unrelated label addition: $label_name"
            echo "should_poll=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$action" == "unlabeled" && "$label_name" != "needs-ok-to-test" ]]; then
            echo "Ignoring unrelated label removal: $label_name"
            echo "should_poll=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          has_ok_to_test="${{ contains(github.event.pull_request.labels.*.name, 'ok-to-test') }}"
          has_needs_ok="${{ contains(github.event.pull_request.labels.*.name, 'needs-ok-to-test') }}"

          if [[ "$has_ok_to_test" != "true" || "$has_needs_ok" == "true" ]]; then
            echo "PR is not label-eligible (ok-to-test=$has_ok_to_test, needs-ok-to-test=$has_needs_ok)"
            echo "should_poll=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "should_poll=true" >> "$GITHUB_OUTPUT"

      - name: Check if all CI checks passed
        if: steps.eligible.outputs.should_poll == 'true'
        uses: wechuli/allcheckspassed@0b68b3b7d92e595bcbdea0c860d05605720cf479
        with:
          delay: '5'
          retries: '10'
          polling_interval: '5'
          # Exclude checks dynamically created by the GitHub Copilot pull request reviewer.
          # These checks fail with HTTP 403 on fork PRs due to permission limitations,
          # causing false negatives in the status gate. If the Copilot reviewer adds or
          # renames checks, update this list accordingly.
          checks_exclude: '^Cleanup artifacts$,^Upload results$,^Agent$,^Prepare$'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
