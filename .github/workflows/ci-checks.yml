# This workflow checks if all CI checks have passed by polling every 5 minutes.
name: CI Check

on:
  pull_request_target:
    types: [opened, synchronize, reopened, labeled, unlabeled]

jobs:
  check_ci_status:
    runs-on: ubuntu-latest
    # Only run for eligible PRs: must have 'ok-to-test' and not 'needs-ok-to-test'.
    # For 'unlabeled' events, only react when 'needs-ok-to-test' is removed (the only
    # label removal that can change eligibility), to avoid restarting the 50-min polling
    # loop on unrelated label changes like 'size/L' or 'lgtm'.
    # Using a job-level condition so ineligible PRs are 'skipped' rather than 'success',
    # which prevents a wasted downstream workflow_run trigger.
    if: >
      (github.event.action != 'unlabeled' || github.event.label.name == 'needs-ok-to-test') &&
      contains(github.event.pull_request.labels.*.name, 'ok-to-test') &&
      !contains(github.event.pull_request.labels.*.name, 'needs-ok-to-test')
    permissions:
      checks: read
    steps:
      - name: Check if all CI checks passed
        uses: wechuli/allcheckspassed@0b68b3b7d92e595bcbdea0c860d05605720cf479
        with:
          delay: '5'
          retries: '10'
          polling_interval: '5'
          # Exclude checks dynamically created by the GitHub Copilot pull request reviewer.
          # These checks fail with HTTP 403 on fork PRs due to permission limitations,
          # causing false negatives in the status gate. If the Copilot reviewer adds or
          # renames checks, update this list accordingly.
          checks_exclude: '^Cleanup artifacts$,^Upload results$,^Agent$,^Prepare$'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
