name: KFP API Integration V2 (Legacy)

on:
  push:
    branches: [master]

  pull_request:
    paths:
      - '.github/workflows/legacy-v2-api-integration-tests.yml'
      - '.github/workflows/image-builds.yml'
      - '.github/actions/create-cluster/**'
      - '.github/actions/deploy/**'
      - '.github/actions/publish-ci-result/**'
      - '.github/resources/**'
      - 'api/**'
      - 'go.mod'
      - 'go.sum'
      - 'backend/**'
      - 'manifests/kustomize/**'
      - 'test/**'
      - '!**/*.md'
      - '!**/OWNERS'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    uses: ./.github/workflows/image-builds.yml

  api-integration-tests-v2:
    runs-on: ubuntu-latest
    # Real ceiling for a hung suite. Without this the job inherits GitHub's
    # 6-hour default, and the go test -timeout below is the only hang-stop.
    timeout-minutes: 40
    permissions:
      actions: read
      contents: read
    strategy:
      matrix:
        pipeline_store: [ "database", "kubernetes" ]
        k8s_version: [ "v1.36.1" ]
        pod_to_pod_tls_enabled: [ "true", "false" ]
        # The PVC cache scenario accounts for about three minutes of the
        # otherwise serial suite. Give it a separate cluster/job so it can run
        # alongside the remaining tests without sharing cleanup state.
        test_group: [ "main", "pvc-cache" ]
        exclude:
          # Pod to Pod TLS manifests are not yet implemented for Kubernetes Native API mode
          - pipeline_store: "kubernetes"
            pod_to_pod_tls_enabled: "true"
      fail-fast: false

    name: API integration tests v2 - K8s with ${{ matrix.pipeline_store }} ${{ matrix.k8s_version }} pod_to_pod_tls_enabled=${{ matrix.pod_to_pod_tls_enabled }} testGroup=${{ matrix.test_group }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: ./.github/actions/setup-go

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.9

      - name: Create KFP cluster
        id: create-kfp-cluster
        uses: ./.github/actions/create-cluster
        with:
          k8s_version: ${{ matrix.k8s_version }}
        continue-on-error: true

      - name: Deploy
        id: deploy
        uses: ./.github/actions/deploy
        if: ${{ steps.create-kfp-cluster.outcome == 'success' }}
        with:
          image_path: images_${{ github.run_id }}
          image_tag: latest
          image_registry: kind-registry:5000
          pipeline_store: ${{ matrix.pipeline_store }}
          pod_to_pod_tls_enabled: ${{ matrix.pod_to_pod_tls_enabled }}

      - name: Configure Cluster CA Cert for TLS-Enabled Tests
        shell: bash
        if: ${{ matrix.pod_to_pod_tls_enabled == 'true' }}
        run: |
          kubectl get secret kfp-api-tls-cert -n kubeflow -o jsonpath='{.data.ca\.crt}' | base64 -d > "${{ github.workspace }}/ca.crt"
          echo "CA_CERT_PATH=${{ github.workspace }}/ca.crt" >> "$GITHUB_ENV"

      - name: Forward MLMD port
        id: forward-mlmd-port
        if: ${{ steps.deploy.outcome == 'success' }}
        run: kubectl -n kubeflow port-forward svc/metadata-grpc-service 8080:8080 &
        continue-on-error: true

      - name: Start network observability
        id: network-observability
        if: ${{ steps.forward-mlmd-port.outcome == 'success' }}
        run: ./.github/resources/scripts/network-observability.sh start kubeflow /tmp/tmp-network-observability
        continue-on-error: true

      - name: API integration tests v2
        id: tests
        if: ${{ steps.forward-mlmd-port.outcome == 'success' }}
        working-directory: ./backend/test/v2/integration
        # The PVC cache scenario runs in its own matrix job; the main group
        # skips only that subtest. The union is the original suite, while each
        # group keeps the full store/TLS matrix and an independent cluster.
        # -timeout 20m remains the real ceiling for a stalled group.
        # Output is teed to a file so the step below can turn a budget
        # overrun into an explicit annotation instead of a buried panic.
        shell: bash
        run: |
          FILTER_ARGS=(-skip '^TestCache$/^TestCacheSingleRunWithPVC_SameName_Caches$')
          if [[ "${{ matrix.test_group }}" == "pvc-cache" ]]; then
            FILTER_ARGS=(-run '^TestCache$/^TestCacheSingleRunWithPVC_SameName_Caches$')
          fi
          go test -json -v -timeout 20m "${FILTER_ARGS[@]}" ./... \
            -args -runIntegrationTests=true -namespace=kubeflow \
            -tlsEnabled=${{ matrix.pod_to_pod_tls_enabled }} \
            -caCertPath=${{ env.CA_CERT_PATH }} \
            -repoName=${{ github.repository }} \
            -branchName=${{ github.ref_name }} \
            2>&1 | tee "$RUNNER_TEMP/go-test-output.log"
        env:
          PULL_NUMBER: ${{ github.event.pull_request.number }}
          PIPELINE_STORE: ${{ matrix.pipeline_store }}
          # Authenticates the raw.githubusercontent.com HEAD in
          # GetRepoBranchURLRAW to avoid anonymous per-IP 429 rate limits.
          GITHUB_TOKEN: ${{ github.token }}
        continue-on-error: true

      - name: Publish normalized CI result
        if: always() && !cancelled()
        uses: ./.github/actions/publish-ci-result
        with:
          test_outcome: ${{ steps.tests.outcome }}
          report_name: API integration tests v2 - ${{ matrix.pipeline_store }} ${{ matrix.k8s_version }} TLS=${{ matrix.pod_to_pod_tls_enabled }} group=${{ matrix.test_group }}
          go_json: ${{ runner.temp }}/go-test-output.log
          pipeline_store: ${{ matrix.pipeline_store }}

      - name: Report network observability
        if: ${{ always() && steps.forward-mlmd-port.outcome == 'success' }}
        shell: bash
        run: |
          ./.github/resources/scripts/network-observability.sh stop kubeflow /tmp/tmp-network-observability || true
          if [ "${{ steps.tests.outcome }}" = "success" ]; then
            rm -rf /tmp/tmp-network-observability
          fi
        continue-on-error: true

      - name: Explain suite time budget overrun
        if: ${{ steps.tests.outcome != 'success' }}
        shell: bash
        run: |
          LOG="$RUNNER_TEMP/go-test-output.log"
          if [ ! -f "$LOG" ] || ! grep -q 'panic: test timed out after' "$LOG"; then
            echo "Tests failed for a reason other than the suite time budget; see the test step output."
            exit 0
          fi
          BUDGET=$(grep -m1 -oE 'test timed out after [0-9a-z]+' "$LOG" | awk '{print $NF}')
          {
            echo "## :alarm_clock: Test suite exceeded its ${BUDGET} time budget"
            echo
            echo "The whole \`go test\` binary was killed by its \`-timeout\`, discarding all results."
            echo "Each sharded group normally completes well below this budget. The interrupted"
            echo "test below usually shows a near-zero elapsed time when cumulative lane slowness"
            echo "consumed the budget before that test started."
            echo
            echo '```'
            grep -A 8 'panic: test timed out after' "$LOG" | head -10
            echo '```'
            echo
            echo "**If this recurs on otherwise healthy PRs:** the suite has outgrown its budget —"
            echo "inspect the group timing and cluster state before raising \`-timeout\` or rerunning."
          } >> "$GITHUB_STEP_SUMMARY"
          echo "::error title=Legacy V2 suite exceeded its ${BUDGET} test budget::The sharded go test group was killed by -timeout (${BUDGET}), discarding its results. See the job summary for timing and cluster-state guidance."

      - name: Collect failed logs
        if: ${{ steps.deploy.outcome != 'success' || steps.forward-mlmd-port.outcome != 'success' || steps.tests.outcome != 'success' }}
        run: |
          ./.github/resources/scripts/collect-logs.sh --ns kubeflow --output /tmp/tmp_pod_log.txt
          exit 1

      - name: Collect test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: kfp-api-integration-tests-v2-artifacts-k8s-${{ matrix.k8s_version }}-${{ matrix.pipeline_store }}-tls-${{ matrix.pod_to_pod_tls_enabled }}-${{ matrix.test_group }}
          path: /tmp/tmp*/*
