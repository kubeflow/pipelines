name: Build Images
on:
  workflow_call:
    outputs:
      IMAGE_PATH:
        description: 'A description of my output'
        value: ${{ jobs.image-build.outputs.image_path }}
      IMAGE_TAG:
        description: 'A description of my output'
        value: ${{ jobs.image-build.outputs.image_tag }}
      IMAGE_REGISTRY:
        description: 'A description of my output'
        value: ${{ jobs.image-build.outputs.registry }}

env:
  IMAGE_TAG: "latest"
  REGISTRY: "kind-registry:5000"
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  GITHUB_SHA: ${{ github.sha }}

jobs:
  runtime-base-images:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true
    env:
      ARTIFACT_NAME: "runtime-base-images"
      ARTIFACTS_PATH: "images_${{ github.run_id }}"
      RUNTIME_BASE_IMAGE_ARCHIVE: "runtime-base-images.tar"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Create Artifacts Path Directory
        run: mkdir -p ${{ env.ARTIFACTS_PATH }}

      - name: Pull and save runtime base images
        shell: bash
        run: |
          set -euo pipefail
          source .github/resources/scripts/helper-functions.sh
          pull_and_save_runtime_base_images \
            .github/resources/runtime-base-images.txt \
            "${ARTIFACTS_PATH}/${RUNTIME_BASE_IMAGE_ARCHIVE}"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.ARTIFACTS_PATH }}/${{ env.RUNTIME_BASE_IMAGE_ARCHIVE }}
          retention-days: 1

  image-build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      image_path: ${{ steps.configure.outputs.artifact_path }}
      image_tag: ${{ steps.configure.outputs.image_tag }}
      registry: ${{ steps.configure.outputs.registry }}
    strategy:
      # A single failing image build must not cancel the other builds in the
      # matrix: cancelled jobs skip their rebuild fallback (a cancelled build
      # step has outcome 'cancelled', not 'failure'), so fail-fast turns one
      # transient failure into a full workflow failure.
      fail-fast: false
      matrix:
        include:
          - image: apiserver
            dockerfile: backend/Dockerfile
            context: .
          - image: persistenceagent
            dockerfile: backend/Dockerfile.persistenceagent
            context: .
          - image: scheduledworkflow
            dockerfile: backend/Dockerfile.scheduledworkflow
            context: .
          - image: launcher
            dockerfile: backend/Dockerfile.launcher
            context: .
          - image: driver
            dockerfile: backend/Dockerfile.driver
            context: .
          - image: frontend
            dockerfile: frontend/Dockerfile
            context: .
          - image: metadata-writer
            dockerfile: backend/metadata_writer/Dockerfile
            context: .
          - image: viewer-crd-controller
            dockerfile: backend/Dockerfile.viewercontroller
            context: .
          - image: visualization-server
            dockerfile: backend/Dockerfile.visualization
            context: .
          - image: cache-deployer
            dockerfile: backend/src/cache/deployer/Dockerfile
            context: .
          - image: cache-server
            dockerfile: backend/Dockerfile.cacheserver
            context: .
          - image: metadata-envoy
            dockerfile: third_party/metadata_envoy/Dockerfile
            context: .
    env:
      ARTIFACT_NAME: "${{ matrix.image }}"
      ARTIFACTS_PATH: "images_${{ github.run_id }}"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Read frontend Node version
        id: frontend_node
        run: echo "version=$(tr -d '\r\n' < frontend/.nvmrc | sed 's/^v//')" >> "$GITHUB_OUTPUT"

      - name: Create Artifacts Path Directory
        id: configure
        run: |
          mkdir -p ${{ env.ARTIFACTS_PATH }}
          {
            echo "artifact_path=${{ env.ARTIFACTS_PATH }}"
            echo "image_tag=${{ env.IMAGE_TAG }}"
            echo "registry=${{ env.REGISTRY }}"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        id: setup-buildx

      - name: Build and save Docker image
        uses: docker/build-push-action@v6
        id: save-image
        continue-on-error: true
        env:
          # Disable the job summary report in the GitHub Actions UI
          DOCKER_BUILD_SUMMARY: false
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          build-args: |
            NODE_VERSION=${{ steps.frontend_node.outputs.version }}
          tags: ${{ env.REGISTRY }}/${{ matrix.image }}:${{ env.IMAGE_TAG }}
          outputs: type=docker,dest=${{ env.ARTIFACTS_PATH }}/${{ env.ARTIFACT_NAME }}.tar

      - name: Wait before rebuilding
        if: ${{ steps.save-image.outcome == 'failure' }}
        run: sleep 10

      - name: Rebuild Images in case of failure
        uses: docker/build-push-action@v6
        if: ${{ steps.save-image.outcome == 'failure' }}
        id: rebuild
        env:
          # Disable the job summary report in the GitHub Actions UI
          DOCKER_BUILD_SUMMARY: false
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          no-cache: true
          build-args: |
            NODE_VERSION=${{ steps.frontend_node.outputs.version }}
          tags: ${{ env.REGISTRY }}/${{ matrix.image }}:${{ env.IMAGE_TAG }}
          outputs: type=docker,dest=${{ env.ARTIFACTS_PATH }}/${{ env.ARTIFACT_NAME }}.tar

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        if: ${{ steps.save-image.outcome == 'success' || steps.rebuild.outcome == 'success' }}
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.ARTIFACTS_PATH }}/${{ env.ARTIFACT_NAME }}.tar
          retention-days: 1
