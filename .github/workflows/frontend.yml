name: Frontend Tests

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
    paths:
      - 'frontend/**'
      - 'backend/api/v1beta1/swagger/**'
      - 'backend/api/v2beta1/swagger/**'
      - '.github/workflows/frontend.yml'
      - '!**/*.md'
      - '!**/OWNERS'
      - 'backend/src/apiserver/config/sample_config.json'

jobs:
  frontend-tests:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version-file: frontend/.nvmrc

    - name: Check for lockfile drift
      if: github.event_name == 'pull_request'
      run: |
        git fetch origin ${{ github.base_ref }} --depth=1
        pkg_changed=false
        lock_changed=false
        if ! git diff --quiet origin/${{ github.base_ref }} -- frontend/package.json; then
          pkg_changed=true
        fi
        if ! git diff --quiet origin/${{ github.base_ref }} -- frontend/package-lock.json; then
          lock_changed=true
        fi
        if [ "$lock_changed" = true ] && [ "$pkg_changed" = false ]; then
          echo "::error::frontend/package-lock.json has drifted from ${{ github.base_ref }} without a corresponding change to package.json. This can cause silent Prettier/tooling version mismatches. Please rebase onto ${{ github.base_ref }} and run 'npm ci' to sync your lockfile."
          exit 1
        fi

    - name: Clean npm cache
      run: npm cache clean --force

    - name: Install dependencies
      run: cd ./frontend && npm ci

    - name: Verify generated API clients are up to date
      run: |
        cd ./frontend
        npm run apis:all
        git diff --exit-code -- \
          src/apis \
          src/apisv2beta1 \
          server/src/generated/apis \
          server/src/generated/apisv2beta1

    - name: Run Frontend Tests
      run: cd ./frontend && npm run test:ci
