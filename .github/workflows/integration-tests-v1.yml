name: KFP API Integration v1 tests

on:
  push:
    branches: [master]

  pull_request:
    paths:
      - '.github/workflows/integration-tests-v1.yml'
      - '.github/workflows/image-builds.yml'
      - '.github/actions/create-cluster/**'
      - '.github/actions/deploy/**'
      - '.github/actions/publish-ci-result/**'
      - '.github/resources/**'
      - 'api/**'
      - 'go.mod'
      - 'go.sum'
      - 'backend/**'
      - 'manifests/kustomize/**'
      - 'test/**'
      - '!**/*.md'
      - '!**/OWNERS'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    uses: ./.github/workflows/image-builds.yml

  initialization-integration-tests-v1:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    strategy:
      matrix:
        k8s_version: [ "v1.33.12", "v1.36.1" ]
    name: Initialization & Integration tests v1 - K8s ${{ matrix.k8s_version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: ./.github/actions/setup-go

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.9

      - name: Create KFP cluster
        id: create-kfp-cluster
        uses: ./.github/actions/create-cluster
        with:
          k8s_version: ${{ matrix.k8s_version }}
        continue-on-error: true

      - name: Deploy
        id: deploy
        uses: ./.github/actions/deploy
        if: ${{ steps.create-kfp-cluster.outcome == 'success' }}
        with:
          image_path: images_${{ github.run_id }}
          image_tag: latest
          image_registry: kind-registry:5000
          forward_port: 'false'

      - name: Deploy pipeline URL test fixtures
        id: deploy-pipeline-test-fixtures
        if: ${{ steps.deploy.outcome == 'success' }}
        run: |
          kubectl kustomize --load-restrictor LoadRestrictionsNone \
            .github/resources/manifests/pipeline-test-fixtures | kubectl apply -f -
          kubectl set env deployment/ml-pipeline --namespace kubeflow \
            PIPELINE_URL_VALIDATION_ENABLED=false
          kubectl rollout status deployment/pipeline-test-fixtures \
            --namespace kubeflow --timeout 90s
          kubectl rollout status deployment/ml-pipeline \
            --namespace kubeflow --timeout 90s
        continue-on-error: true

      - name: Forward API port
        id: forward-api-port
        if: ${{ steps.deploy-pipeline-test-fixtures.outcome == 'success' }}
        run: ./.github/resources/scripts/forward-port.sh "kubeflow" "ml-pipeline" 8888 8888
        continue-on-error: true

      - name: Forward MySQL port
        id: forward-mysql-port
        if: ${{ steps.forward-api-port.outcome == 'success' }}
        run: ./.github/resources/scripts/forward-port.sh "kubeflow" "mysql" 3306 3306
        continue-on-error: true

      - name: Initialization tests v1
        id: initialization-tests
        if: ${{ steps.forward-mysql-port.outcome == 'success' }}
        working-directory: ./backend/test/initialization
        run: |
          go test -json -v ./... -namespace=kubeflow \
            -args -runIntegrationTests=true \
            | tee "$RUNNER_TEMP/initialization-go-test.json"
        env:
          PULL_NUMBER: ${{ github.event.pull_request.number }}
        continue-on-error: true

      - name: API integration tests v1
        id: integration-tests
        if: ${{ steps.forward-mysql-port.outcome == 'success' }}
        working-directory: ./backend/test/integration
        run: |
          go test -json -v ./... -args -runIntegrationTests=true \
            -namespace=kubeflow -repoName=${{ github.repository }} \
            -branchName=${{ github.ref_name }} \
            | tee "$RUNNER_TEMP/integration-go-test.json"
        env:
          KFP_TEST_FIXTURE_BASE_URL: http://pipeline-test-fixtures.kubeflow.svc.cluster.local:8080
        continue-on-error: true

      - name: Publish normalized CI result
        if: always() && !cancelled()
        uses: ./.github/actions/publish-ci-result
        with:
          test_outcome: ${{ (steps.initialization-tests.outcome == 'success' && steps.integration-tests.outcome == 'success') && 'success' || 'failure' }}
          report_name: Initialization & Integration tests v1 - K8s ${{ matrix.k8s_version }}
          go_json: ${{ runner.temp }}/*-go-test.json

      - name: Collect failed logs
        if: ${{ steps.deploy-pipeline-test-fixtures.outcome != 'success' || steps.forward-api-port.outcome != 'success' || steps.forward-mysql-port.outcome != 'success' || steps.integration-tests.outcome != 'success' || steps.initialization-tests.outcome != 'success' }}
        run: |
          ./.github/resources/scripts/collect-logs.sh --ns kubeflow --output /tmp/tmp_pod_log.txt
          exit 1

      - name: Collect test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: kfp-initialization-tests-v1-artifacts-k8s-${{ matrix.k8s_version }}
          path: /tmp/tmp*/*
