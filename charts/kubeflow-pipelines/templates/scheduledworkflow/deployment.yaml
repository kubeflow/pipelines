apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-pipeline-scheduledworkflow
  namespace: {{ .Release.Namespace }}
  labels:
    app: ml-pipeline-scheduledworkflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ml-pipeline-scheduledworkflow
  template:
    metadata:
      annotations:
        cluster-autoscaler.kubernetes.io/safe-to-evict: "true"
      labels:
        app: ml-pipeline-scheduledworkflow
    spec:
      serviceAccountName: ml-pipeline-scheduledworkflow
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: ml-pipeline-scheduledworkflow
          image: ghcr.io/kubeflow/kfp-scheduled-workflow-controller:2.16.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9090
              name: http
          env:
            - name: METRICS_PORT
              value: "9090"
            - name: CLIENT_QPS
              value: "10"
            - name: RESYNC_INTERVAL_SECONDS
              value: "30"
            - name: CLIENT_BURST
              value: "20"
            - name: LOG_LEVEL
              value: info
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          volumeMounts:
            - mountPath: /var/run/secrets/kubeflow/tokens
              name: scheduledworkflow-sa-token
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsGroup: 0
            runAsNonRoot: true
            runAsUser: 1000
            seccompProfile:
              type: RuntimeDefault
      volumes:
        - name: scheduledworkflow-sa-token
          projected:
            sources:
              - serviceAccountToken:
                  audience: pipelines.kubeflow.org
                  expirationSeconds: 3600
                  path: scheduledworkflow-sa-token
