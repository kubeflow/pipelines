apiVersion: apps/v1
kind: Deployment
metadata:
  name: metadata-writer
  namespace: {{ .Release.Namespace }}
  labels:
    app: metadata-writer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: metadata-writer
  template:
    metadata:
      labels:
        app: metadata-writer
    spec:
      serviceAccountName: kubeflow-pipelines-metadata-writer
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: main
          image: ghcr.io/kubeflow/kfp-metadata-writer:2.16.0
          imagePullPolicy: IfNotPresent
          env:
            - name: NAMESPACE_TO_WATCH
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsGroup: 0
            runAsNonRoot: true
            runAsUser: 1000
            seccompProfile:
              type: RuntimeDefault
