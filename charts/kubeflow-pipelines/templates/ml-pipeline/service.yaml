apiVersion: v1
kind: Service
metadata:
  name: ml-pipeline
  namespace: {{ .Release.Namespace }}
  labels:
    app: ml-pipeline
spec:
  type: ClusterIP
  selector:
    app: ml-pipeline
  ports:
    - name: http
      port: 8888
      protocol: TCP
      targetPort: 8888
    - name: grpc
      port: 8887
      protocol: TCP
      targetPort: 8887
