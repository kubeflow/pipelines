syntax = "proto3";

option go_package = "github.com/kubeflow/pipelines/backend/api/v2beta1/go_client";
package kubeflow.pipelines.backend.api.v2beta1;

import "google/api/annotations.proto";
import "google/rpc/status.proto";
import "protoc-gen-openapiv2/options/annotations.proto";
import "backend/api/v2beta1/run.proto";

option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {
  schemes: [1, 2], // http + https
  responses: {
    key: "default";
    value: {
      schema: {
        json_schema: {
          ref: ".google.rpc.Status";
        }
      }
    }
  }
  security_definitions: {
    security: {
      key: "Bearer";
      value: {
        type: TYPE_API_KEY;
        in: IN_HEADER;
        name: "authorization";
      }
    }
  }
  security: {
    security_requirement: {
      key: "Bearer";
      value: {};
    }
  }
};

service TaskService {
  // Finds a specific pipeline task by ID.
  rpc GetPipelineTask(GetPipelineTaskRequest) returns (PipelineTaskDetail) {
    option (google.api.http) = {
      get: "/apis/v2beta1/tasks/{task_id}"
    };
  }

  // Finds all pipeline tasks. Supports pagination, and sorting on certain fields.
  rpc ListPipelineTasks(ListPipelineTasksRequest) returns (ListPipelineTasksResponse) {
    option (google.api.http) = {
      get: "/apis/v2beta1/tasks"
    };
  }
}

message GetPipelineTaskRequest {
  // Required. The ID of the pipeline task to be retrieved.
  string task_id = 1;
}

message ListPipelineTasksRequest {
  // Optional input field. Filters based on the namespace.
  string namespace = 1;

  // A page token to request the next page of results. The token is acquired
  // from the nextPageToken field of the response from the previous
  // ListPipelineTasks call or can be omitted when fetching the first page.
  string page_token = 2;

  // The number of tasks to be listed per page. If there are more tasks than this
  // number, the response message will contain a nextPageToken field you can use
  // to fetch the next page.
  int32 page_size = 3;

  // Can be format of "field_name", "field_name asc" or "field_name desc"
  // (Example, "name asc" or "id desc"). Ascending by default.
  string sort_by = 4;

  // A url-encoded, JSON-serialized Filter protocol buffer (see
  // [filter.proto](https://github.com/kubeflow/pipelines/blob/master/backend/api/filter.proto)).
  string filter = 5;
}

message ListPipelineTasksResponse {
  // A list of pipeline tasks returned.
  repeated PipelineTaskDetail pipeline_tasks = 1;

  // The token to list the next page of pipeline tasks.
  string next_page_token = 2;

  // The total number of pipeline tasks for the given query.
  int32 total_size = 3;
}
