syntax = "proto3";

option go_package = "github.com/kubeflow/pipelines/backend/api/v2beta1/go_client";
package kubeflow.pipelines.backend.api.v2beta1;

import "backend/api/v2beta1/run.proto";
import "google/api/annotations.proto";
import "protoc-gen-openapiv2/options/annotations.proto";
option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {
    schemes: [1, 2],  // http + https
    responses: {
      key: "default";
      value: {
        schema: { json_schema: { ref: ".google.rpc.Status"; } }
      }
    }
    security_definitions: {
      security: {
        key: "Bearer";
        value: { type: TYPE_API_KEY; in: IN_HEADER; name: "authorization"; }
      }
    }
    security: {
      security_requirement: { key: "Bearer"; value: {}; }
    }
};
service TaskService {
    rpc GetPipelineTask(GetPipelineTaskRequest) returns (PipelineTaskDetail) {
      option (google.api.http) = {
        get: "/apis/v2beta1/tasks/{task_id}"
      };
    }

    rpc ListPipelineTasks(ListPipelineTasksRequest) returns (ListPipelineTasksResponse) {
      option (google.api.http) = {
        get: "/apis/v2beta1/tasks"
      };
    }
}
message GetPipelineTaskRequest {
    string task_id = 1;
}

message ListPipelineTasksRequest {
    string run_id = 1;
    string page_token = 2;
    int32 page_size = 3;
    string sort_by = 4;
    string filter = 5;
}

message ListPipelineTasksResponse {
    repeated PipelineTaskDetail tasks = 1;
    string next_page_token = 2;
    int32 total_size = 3;
}
