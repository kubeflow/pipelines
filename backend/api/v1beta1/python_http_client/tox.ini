[tox]
envlist = py27, py3
skip_missing_interpreters = true

[testenv]
deps=
     certifi >= 14.05.14
     future; python_version<="2.7"
     six >= 1.10
     python_dateutil >= 2.5.3
     setuptools >= 21.0.0
     urllib3 >= 1.15.1
     pytest==4.6.11; python_version<"3.0"
     pytest==7.4.0; python_version>="3.0"
     pytest-cov>=2.8.1
     pytest-randomly==1.2.3; python_version<"3.0"
     pytest-randomly==3.15.0; python_version>="3.0"

commands=
   pytest --cov=kfp_server_api
